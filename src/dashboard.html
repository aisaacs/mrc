<title>Mister Claude</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --panel2:#1d212b; --line:#262b36; --fg:#e6e9ef; --dim:#8b93a3;
          --accent:#7aa2f7; --good:#7bd88f; --warn:#e0af68; --bad:#f7768e; --lead:#bb9af7; }
  * { box-sizing:border-box }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; height:100vh; overflow:hidden }
  code,pre,.mono { font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace }
  a { color:var(--accent); text-decoration:none }
  /* layout */
  .app { display:grid; grid-template-rows:50px 1fr; height:100vh }
  header { display:flex; align-items:center; gap:12px; padding:0 16px; border-bottom:1px solid var(--line); background:var(--panel) }
  header h1 { font-size:15px; margin:0; font-weight:650; letter-spacing:.2px }
  header .spacer { flex:1 }
  .main { display:grid; grid-template-columns:340px 1fr; min-height:0 }
  .list { border-right:1px solid var(--line); overflow:auto; padding:10px }
  .detail { display:flex; flex-direction:column; overflow:auto; padding:16px 20px; min-width:0; min-height:0 }
  .detail > * { flex-shrink:0 }   /* flowing views keep natural height + the pane scrolls; fill children (#tabbody / the iframe) override below */
  #tabbody { flex:1 1 0; min-height:0; display:flex; flex-direction:column; overflow:auto }   /* transcript/summary fill the remaining height; catch-up cards scroll */
  /* pills / badges */
  .pill { font-size:11px; padding:2px 8px; border-radius:999px; border:1px solid var(--line); color:var(--dim) }
  .pill.on { color:var(--good); border-color:#2c4533 } .pill.off { color:var(--bad); border-color:#4a2a31 }
  .badge { font-size:10px; background:#3a2f4f; color:#d7c5f5; border-radius:999px; padding:0 6px; margin-left:auto }
  .state { font-size:10px; padding:1px 7px; border-radius:6px; border:1px solid var(--line); color:var(--dim) }
  .state.Running { color:var(--good) } .state.Paused { color:var(--warn) } .state.History { color:var(--dim) }
  h2 { font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--dim); margin:16px 0 8px } h2:first-child { margin-top:4px }
  h2.you { color:var(--lead); font-size:12px; display:flex; align-items:center; gap:8px } h2.you .badge { margin-left:0 }
  .dim { color:var(--dim) } .muted { color:var(--dim); font-size:12px } .good{color:var(--good)} .bad{color:var(--bad)} .warn{color:var(--warn)}
  .h { font-family:ui-monospace,monospace; font-size:12.5px }
  .dot { width:8px; height:8px; border-radius:50%; background:#3a4150; display:inline-block; flex:0 0 auto }
  .dot.online, .dot.ready { background:var(--good); box-shadow:0 0 6px #7bd88f88 }
  .dot.starting { background:var(--warn); box-shadow:0 0 7px #e0af68aa; animation:pulse 1.2s ease-in-out infinite }
  .dot.worker { background:var(--accent) } .dot.off { background:#3a4150 }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .mstate { font-size:10.5px; margin-left:6px; white-space:nowrap }
  .mstate.ready{color:var(--good)} .mstate.starting{color:var(--warn)} .mstate.worker{color:var(--accent)} .mstate.off{color:var(--dim)}
  /* cards */
  .team { background:var(--panel); border:1px solid var(--line); border-radius:11px; padding:12px 12px 10px; margin-bottom:12px }
  .team .tn { font-weight:650; font-size:13px; margin-bottom:8px; padding:0 2px; display:flex; gap:8px; align-items:center }
  .mem { display:flex; align-items:center; gap:8px; padding:6px 8px; font-size:13px; cursor:pointer; border:1px solid transparent; border-radius:7px }
  .mem + .mem { margin-top:2px }
  .mem:hover { background:var(--panel2) } .mem.sel { background:var(--panel2); border-color:var(--accent) }
  .mem .who { flex:1; min-width:0; overflow:hidden; white-space:nowrap; text-overflow:ellipsis }
  .mem .bk { font-size:11px } .mem.lead .h{ color:var(--lead) }
  .mem .mstate { flex:0 0 80px; text-align:right; margin-left:0 }
  .mem .role { flex:0 0 90px; text-align:right; color:var(--dim); font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
  .rm { display:flex; align-items:center; gap:8px; padding:7px 9px; border:1px solid var(--line); border-radius:8px; margin:6px 0; cursor:pointer; background:var(--panel) }
  .rm:hover { border-color:#37506e } .rm.sel { border-color:var(--accent); background:var(--panel2) }
  .rm .nm { font-weight:600; font-size:13px } .rm .meta { color:var(--dim); font-size:11px; margin-left:auto }
  .ib { border:1px solid #3a2f4f; background:#1a1622; border-radius:9px; padding:9px 11px; margin-bottom:7px; cursor:pointer }
  .ib.slim { padding:6px 10px; font-size:13px; display:flex; align-items:center; gap:5px } .ib.slim:hover { border-color:#6a5a8a }
  .ib.q { border-color:#5a4a7a } .ib.fyi { background:#12161d; border-color:#2a3344; opacity:.82 }
  .ib.dism { opacity:.45; border-style:dashed } .ib.dism b { text-decoration:line-through }
  .ib .qicon { font-size:11px; flex:0 0 auto } .ib .dismx { margin-left:auto; color:var(--dim); font-size:12px; opacity:.45; flex:0 0 auto } .ib:hover .dismx { opacity:1 } .ib .dismx:hover { color:#f4a6b4 }
  .pane.fyi { border-color:#2a3344; background:#12161d }
  #orgSel { width:auto; background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:5px 10px; font-size:13px; cursor:pointer }
  #orgSel:hover { border-color:#3a4150 }
  header .plabel { font-size:11px; color:var(--dim); margin-left:4px }
  .ib:hover { border-color:#5a4a7a } .ib.sel { border-color:var(--lead) } .ib .who{ font-size:12px; color:var(--dim) } .ib .who b{ color:var(--fg) }
  .ib .q { margin-top:3px } .ib.done { opacity:.5 }
  /* controls */
  textarea,input,select { background:#11141b; color:var(--fg); border:1px solid var(--line); border-radius:7px; padding:7px 9px; font:13px/1.4 inherit; width:100% }
  textarea { resize:vertical; min-height:38px }
  button.btn { background:var(--panel2); color:var(--fg); border:1px solid var(--line); border-radius:7px; padding:6px 12px; cursor:pointer; font-size:12.5px }
  button.btn.launch { background:#1f3a26; border-color:#2f6b3f; color:#bfe6c8 }
  button.btn:hover { border-color:#3a4150 } button.primary { background:#23314d; border-color:#33507e; color:#cfe0ff } button.danger { background:#2a1b21; border-color:#5a3540; color:#f4a6b4 }
  button.tiny { padding:3px 8px; font-size:11px }
  .row { display:flex; gap:8px; align-items:center } .row.wrap{ flex-wrap:wrap } .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px }
  .tabs { display:flex; gap:6px; margin:14px 0 10px } .tabs button { background:transparent; border:1px solid transparent; color:var(--dim); border-radius:7px; padding:5px 10px; cursor:pointer; font-size:12.5px }
  .tabs button.on { background:var(--panel2); color:var(--fg); border-color:var(--line) }
  .thread { background:#0b0d12; border:1px solid var(--line); border-radius:10px; padding:14px; white-space:pre-wrap; word-break:break-word; font-size:12.5px; flex:1 1 0; min-height:0; overflow:auto; margin:0 }
  .thread:focus-visible { outline:1px solid var(--accent); outline-offset:-1px }   /* keyboard-scroll a11y */
  .tline { white-space:pre-wrap; word-break:break-word }
  .qnum { color:var(--lead); font-weight:600 }   /* the question's [#N] anchor target */
  .qjump { color:var(--accent); cursor:pointer; text-decoration:underline dotted }
  .tline.qhi { background:#2a2440; border-radius:5px; transition:background .3s }   /* jump highlight */
  .pane { background:var(--panel); border:1px solid var(--line); border-radius:9px; padding:10px 12px; margin-bottom:8px; flex-shrink:0 }
  .pane.unrev { border-color:#5a4a7a }
  .card { background:#0b0d12; border:1px solid var(--line); border-radius:8px; padding:9px 11px; margin:6px 0; white-space:pre-wrap; font-size:12.5px }
  .empty { color:var(--dim); padding:40px 20px; text-align:center } label{ display:block; font-size:12px; color:var(--dim); margin:8px 0 3px }
  .memrow { display:grid; grid-template-columns:1.3fr 1fr auto 1.1fr auto; gap:8px; align-items:center; padding:5px 0; border-top:1px solid var(--line) }
  .memrow .lead { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--dim); white-space:nowrap } .memrow input[type=checkbox]{ width:auto }
  .roomtag { display:inline-block; font-size:11px; border:1px solid var(--line); border-radius:6px; padding:1px 7px; margin:2px 4px 2px 0; color:var(--dim) }
  .amf { background:#0b0d12; border:1px solid #33507e; border-radius:8px; padding:8px; margin-top:6px }
  .amf select, .amf input { font-size:12px; padding:5px 7px }
  /* project tabs (one per org) */
  .tabstrip { display:flex; gap:4px; align-items:flex-end; overflow-x:auto; flex:1; min-width:0; margin:0 10px; scrollbar-width:thin }
  .tabstrip::-webkit-scrollbar { height:5px } .tabstrip::-webkit-scrollbar-thumb { background:#2a3550; border-radius:3px }
  .ptab { display:flex; align-items:center; gap:6px; flex:0 0 auto; max-width:180px; padding:5px 10px; border:1px solid var(--line); border-radius:8px; background:var(--panel); color:var(--dim); cursor:pointer; font-size:12.5px }
  .ptab:hover { color:var(--fg); border-color:#37506e }
  .ptab.active { background:var(--panel2); color:var(--fg); border-color:var(--accent) }
  .ptab.closed:not(.active) { opacity:.5 }
  .ptab .pdot { width:6px; height:6px; border-radius:50%; flex:0 0 auto }
  .ptab.running .pdot { background:#3f9d54 } .ptab.closed .pdot { background:#555c6b } .ptab.active .pdot { background:var(--accent) }
  .ptab .pname { white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
  .ptab .pbadge { background:#5a4a7a; color:#e7dcff; border-radius:10px; padding:0 6px; font-size:10.5px; font-weight:700; flex:0 0 auto }
  .ptab .plink { color:var(--accent); font-size:11px; font-weight:700; flex:0 0 auto }   /* Telegram link awaiting confirm — distinct from the needs-you badge */
  .ptab .pclose { opacity:0; color:var(--dim); font-size:14px; line-height:.8; flex:0 0 auto; padding:0 1px } .ptab:hover .pclose { opacity:.65 } .ptab .pclose:hover { color:#f4a6b4; opacity:1 }
  .ptab.add { color:var(--dim); font-size:15px; padding:4px 11px } .ptab.add:hover { color:#bfe6c8; border-color:#2f6b3f }
  .tabovf { flex:0 0 auto; background:var(--panel); border:1px solid var(--line); border-radius:8px; color:var(--dim); cursor:pointer; padding:5px 8px; font-size:12.5px; position:relative }
  .tabovf:hover { color:var(--fg) }
  .tabmenu { position:absolute; top:100%; right:0; margin-top:4px; background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:4px; z-index:20; min-width:160px; box-shadow:0 6px 20px rgba(0,0,0,.4) }
  .tabmenu div { padding:5px 9px; border-radius:6px; cursor:pointer; font-size:12.5px; white-space:nowrap; display:flex; gap:8px; align-items:center }
  .tabmenu div:hover { background:var(--panel) }
  .resume { background:#0b0d12; border:1px solid #33507e; border-radius:10px; padding:14px 16px; margin:8px 0 14px }
  .resume h3 { margin:0 0 6px; font-size:14px } .resume .step { font-size:12px; color:var(--dim); margin:3px 0 }
  /* #20: a failed state-change surfaces here instead of silently swallowing (stale token → reload). */
  #flash { position:fixed; top:0; left:0; right:0; z-index:1000; display:flex; flex-direction:column; align-items:center; pointer-events:none }
  #flash .fl { pointer-events:auto; margin-top:9px; max-width:680px; padding:9px 14px; border-radius:9px; font-size:13px; box-shadow:0 5px 20px rgba(0,0,0,.5); display:flex; gap:12px; align-items:center }
  #flash .fl.err { background:#3a1518; border:1px solid #7a2630; color:#ffd9dc }
  #flash .fl.stale { background:#1d2740; border:1px solid #3f5d97; color:#dbe6ff }
  #flash .fl .x { cursor:pointer; opacity:.7; margin-left:2px } #flash .fl .x:hover { opacity:1 }
  #flash .fl .btn { padding:3px 11px; font-size:12px }
</style>
</head>
<body>
<div id="flash"></div>
<div class="app">
  <header>
    <h1>🎩 Mister Claude</h1>
    <div class="tabstrip" id="tabs"></div>
    <span class="pill off" id="daemonPill">daemon ?</span>
  </header>
  <div class="main">
    <div class="list" id="mid"></div>
    <div class="detail" id="detail"></div>
  </div>
</div>
<script>
const $ = (s, r=document) => r.querySelector(s)
const esc = (s) => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))
const MRC_TOKEN = (document.querySelector('meta[name=mrc-token]')||{}).content || ''
// Attach the CSRF token to every non-GET request (POST state-changers). A cross-origin page can't read
// MRC_TOKEN (same-origin policy), so it can't forge these. The token is now persisted across daemon
// restarts (#20) so an open tab keeps validating; if it ever still mismatches (HTTP 403), api() stamps
// `_status` so callers can surface a "reload to continue" banner instead of silently swallowing.
const api = (p, o) => {
  if (o && String(o.method||'GET').toUpperCase() !== 'GET') o = { ...o, headers: { ...(o.headers||{}), 'X-MRC-Token': MRC_TOKEN } }
  return fetch(p, o).then(async r => {
    let j; try { j = await r.json() } catch { j = {} }
    if (!r.ok) { if (j.ok===undefined) j.ok = false; j._status = r.status }   // surface HTTP-level failure (403/5xx)
    return j
  })
}
const post = (action, extra={}) => api('/api/action', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ action, ...extra }) })
const postJSON = (path, obj={}) => api(path, { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(obj) })

// State-changing actions MUST confirm success before the UI clears/closes — no optimistic-close (#20).
// act()/actJSON() never throw: a network reject (daemon mid-restart) and a non-2xx both resolve to
// {ok:false,...}. Callers check .ok and only close on success; on failure they keep the item and call
// flashFail(), which surfaces the error — a rotated/again-mismatched token (403) shows a persistent
// "reload to continue" banner; anything else a dismissable error. This is the no-silent-failure floor:
// even with the token persisted, a network blip / 500 / mid-restart must never be swallowed.
const normResult = (r) => (r && r.ok) ? { ok:true } : { ok:false, status: r && r._status, error: (r && r.error) || 'action failed' }
async function act(action, extra={}) { try { return normResult(await post(action, extra)) } catch { return { ok:false, error:'network error — the daemon may be restarting' } } }
async function actJSON(path, obj={}) { try { return normResult(await postJSON(path, obj)) } catch { return { ok:false, error:'network error — the daemon may be restarting' } } }
const isStale = (r) => r && (r.status===403 || /forbidden|x-mrc-token|reload the dashboard/i.test(r.error||''))
function flashFail(r) { S.flash = isStale(r) ? { kind:'stale' } : { kind:'err', text:(r&&r.error)||'action failed' }; renderFlash() }
function renderFlash() {
  const el = $('#flash'); if (!el) return
  if (!S.flash) { el.innerHTML=''; return }
  el.innerHTML = S.flash.kind==='stale'
    ? `<div class="fl stale">⟳ Session refreshed — the daemon restarted. Reload to continue.<button class="btn primary" onclick="location.reload()">Reload</button></div>`
    : `<div class="fl err">⚠ ${esc(S.flash.text)}<span class="x" title="dismiss" onclick="dismissFlash()">✕</span></div>`
}
window.dismissFlash = () => { S.flash=null; renderFlash() }
const setOrgUrl = (org) => { try { history.replaceState(null, '', '/'+encodeURIComponent(org||'')) } catch {} }   // /anigame

const ROLES = ['architect','engineer','critic','adversary','ultracritical','user-defender','researcher','tester','designer','sound-designer','composer']
const BACKENDS = ['claude','codex','qwen','gemini']

const S = {
  building: false, org: null, selRoom: null, selInbox: null, selMember: null, workerLog: '', tab: 'thread', addingTo: null, showDismissed: false, flash: null,
  teams: { members:[], rooms:[], userInbox:[], orgs:[] }, state: { rooms:[], daemon:{} }, room: null, sessions: [], _tick: 0,
  builder: { org:'shop', repo:'', teams:[ { name:'client', territory:'client', members:[
    {role:'architect',backend:'claude',lead:true,territory:''},{role:'engineer',backend:'claude',lead:false,territory:''},{role:'critic',backend:'claude',lead:false,territory:''} ] } ] },
}
let paintedKey = null

// ---- data ----
async function tick() {
  const [t, st] = await Promise.all([ api('/api/teams').catch(()=>S.teams), api('/api/state').catch(()=>S.state) ])
  S.teams = t && t.members ? t : { members:[], rooms:[], userInbox:[], orgs:[] }
  S.state = st && st.rooms ? st : { rooms:[], daemon:{} }
  if (!S.org) S.org = (S.teams.orgs && S.teams.orgs[0] && S.teams.orgs[0].org) || null
  if (_scopedNav) { _scopedNav=false; const has=(S.teams.members||[]).some(m=>!_proj||m.org===_proj); S.building = !has; if (has && _proj) S.org=_proj }
  if ((S._tick++ % 4) === 0) { const sr = await api('/api/sessions').catch(()=>null); S.sessions = (sr && sr.sessions) || [] }   // throttle docker ps
  if (S.selRoom && needRoomFetch()) S.room = await api('/api/room?id='+encodeURIComponent(S.selRoom)).catch(()=>null)
  if (S.selMember) {
    const m = memberByHandle(S.selMember)
    if (m && m.tier==='worker') {
      const r = await api('/api/worker-log?handle='+encodeURIComponent(m.handle)+'&org='+encodeURIComponent(m.org||S.org||'')).catch(()=>null)
      let log = r && r.ok ? (r.log||'') : ''
      if (!log) {   // fallback: scrape the team transcript for this worker (works on any daemon)
        const room = mergedRooms().find(rr=>rr.team===m.team && rr.kind==='team')
        const rd = room ? await api('/api/room?id='+encodeURIComponent(room.roomId)).catch(()=>null) : null
        if (rd) log = (rd.thread||'').split('\n').filter(l=>l.toLowerCase().includes(m.first.toLowerCase())).join('\n')
      }
      S.workerLog = log
    }
  }
  paint()
}
const needRoomFetch = () => !S.building

// merge live engine team rooms with all room dirs (consult pairings + history)
function mergedRooms() {
  const eng = new Map((S.teams.rooms||[]).map(r => [r.roomId, { ...r, live:true, source:'team' }]))
  const out = []
  for (const r of (S.state.rooms||[])) {
    const e = eng.get(r.roomId)
    if (e) { out.push({ ...e, unreviewed:r.unreviewed, updatedAt:r.updatedAt }); eng.delete(r.roomId) }
    else out.push({ roomId:r.roomId, team:null, kind:(r.a&&r.b?'consult':'room'), state:r.state, live:!!r.live, turn:r.turn, members:[], unreviewed:r.unreviewed||0, updatedAt:r.updatedAt||0, a:r.a, b:r.b, source:'room' })
  }
  for (const e of eng.values()) out.push({ ...e, unreviewed:0, updatedAt:Date.now() })
  return out.sort((x,y)=>(Number((y.unreviewed||0)>0)-Number((x.unreviewed||0)>0))||(Number(!!y.live)-Number(!!x.live))||((y.updatedAt||0)-(x.updatedAt||0)))
}
const inOrg = (r) => !S.org || r.org===S.org   // team rooms carry org; org-less consults are NOT in any org
const orgMembers = () => (S.teams.members||[]).filter(m => !S.org || !m.org || m.org===S.org)
function inbox() {
  // Scope the @you queue to the ACTIVE project — items carry their org (#8). An item is OPEN until
  // answered or dismissed (#11). Questions (ask_user) are actionable; notifications (plain @user) are
  // FYI — split so they render + count differently. Legacy/undefined type → notification (safe default).
  const all = (S.teams.userInbox||[]).filter(q => q.org===S.org)
  const open = all.filter(q => !q.answered && !q.dismissed)
  const questions = open.filter(q => q.type==='question')
  const notifications = open.filter(q => q.type!=='question')
  const dismissed = all.filter(q => q.dismissed && !q.answered)   // recoverable via the show-dismissed toggle
  const cu = mergedRooms().filter(r => (r.unreviewed||0)>0 && inOrg(r))
  return { all, open, questions, notifications, dismissed, cu, need: questions.length + cu.reduce((a,c)=>a+(c.unreviewed||0),0) }
}
// Per-project needs-you count (drives each tab's badge): open QUESTIONS only + unreviewed catch-ups in
// that org — notifications never nag. Strict org match (harmonized with inbox()). Derived, not stored.
function orgNeed(org) {
  const qs = (S.teams.userInbox||[]).filter(q => q.org===org && q.type==='question' && !q.answered && !q.dismissed).length
  const cu = mergedRooms().filter(r => (r.unreviewed||0)>0 && r.org===org).reduce((a,c)=>a+(c.unreviewed||0),0)
  return qs + cu
}
// A project is "running" if it has a launch record or any live member up (online/launched).
// A launch record only counts as "running" if the daemon reconciled it as live (tmux up or still
// building) — a stale record from a crash reports running:false, so ▶ Resume/🚀 Launch comes back.
const orgRunning = (org) => (S.teams.launch||[]).some(l=>l.org===org && l.running) || (S.teams.members||[]).some(m=>m.org===org && m.tier==='live' && (m.online||m.launched))
function switchOrg(org) { if (org===S.org) return; S.org=org; S.selRoom=S.selInbox=S.selMember=null; S.building=false; setOrgUrl(org); paint() }
window.switchOrg = switchOrg

// Browser-style project tabs: one per defined org. Chrome-stable — tabs keep a FIXED position
// (definition order); SELECTING a tab only changes which is highlighted, it never reorders the strip
// (a tab jumping to the front on click was the instability @user flagged). Many tabs → the strip
// scrolls horizontally and the active one is scrolled into view (no truncation/overflow menu, so the
// active tab is always reachable without moving anything). Each tab: state dot, needs-you badge, an ✕
// that SUSPENDS (stop + preserve), and a trailing ＋ → Build.
function renderTabs() {
  const el = $('#tabs'); if (!el) return
  const orgs = (S.teams.orgs||[]).map(o=>o.org)   // STABLE order — never re-sorted by active/running state
  const tab = (o) => {
    const need = orgNeed(o), cls = o===S.org ? 'active' : orgRunning(o) ? 'running' : 'closed'
    // A pending Telegram link is a "verify me" event — surfaced on the OWNING tab regardless of which
    // tab is active (#14 B), and visually DISTINCT from the ❓ needs-you badge (a 🔗, not an answer count).
    const link = (S.teams.telegram||{})[o]?.pending?.length || 0
    return `<div class="ptab ${cls}" onclick="switchOrg('${esc(o)}')" title="${esc(o)} · ${orgRunning(o)?'running':'stopped'}">`
      + `<span class="pdot"></span><span class="pname">${esc(o)}</span>`
      + (link?`<span class="plink" title="Telegram link awaiting your confirmation${link>1?` (${link})`:''}">🔗${link>1?link:''}</span>`:'')
      + (need?`<span class="pbadge" title="${need} need you">${need}</span>`:'')
      + `<span class="pclose" title="Close (stop members, keep the team)" onclick="event.stopPropagation();closeTab('${esc(o)}')">✕</span></div>`
  }
  el.innerHTML = orgs.map(tab).join('') + `<div class="ptab add" title="New project (Build)" onclick="newProject()">＋</div>`
  const act = el.querySelector('.ptab.active')
  if (act && act.scrollIntoView) { try { act.scrollIntoView({ inline:'nearest', block:'nearest' }) } catch {} }
}
// Close a tab = SUSPEND: stop the member containers but keep the team defined, transcripts, and
// history — the tab stays as closed-dormant and ▶ Resume brings it back. (Delete is deferred.)
window.closeTab = async (org) => {
  if (!confirm(`Close "${org}"? Members stop; the team, transcripts, and history stay — reopen to resume.`)) return
  const r = await actJSON('/api/team-stop', { org }); if(!r.ok)return flashFail(r); S.flash=null
  tick()
}
// Resume = relaunch the saved roster (deterministic members rebind, each --continues its own convo).
window.resumeTeam = async (org) => { const r=await actJSON('/api/team-launch', { org: org||S.org }); if(!r.ok)return flashFail(r); S.flash=null; tick() }
// Readiness: workers are on-demand; a live member is 'ready' once its channel registers, 'starting'
// while its terminal is up but not connected yet (loading / awaiting login + the Channels prompt).
function memberState(m) {
  if (m.tier==='worker') return { cls:'worker', label:'on-demand' }
  if (m.online) return { cls:'ready', label:'ready' }
  if (m.launched) return { cls:'starting', label:'starting — open Console' }
  return { cls:'off', label:'offline' }
}
const memberByHandle = (h) => orgMembers().find(m => m.handle===h)
const roomMembers = (id) => { const r=(S.teams.rooms||[]).find(x=>x.roomId===id); return r ? r.members.filter(x=>x!=='@user') : [] }

// ---- painting ----
const launchFor = () => (S.teams.launch||[]).find(x=>x.org===S.org && x.running)   // a stale (crashed) launch is not a terminal
const detailKey = () => S.building ? 'build'
  : S.selMember ? (memberByHandle(S.selMember)?.tier==='worker' ? 'wlog:'+S.selMember : 'terminal:'+(launchFor()?.ttydUrl||'none'))
  : S.selInbox!=null ? 'inbox:'+S.selInbox
  : S.selRoom ? 'room:'+S.selRoom+':'+S.tab
  : 'empty'

function paint() {
  // topbar
  const ib = inbox()
  const dp = $('#daemonPill'); const up = (S.state.daemon&&S.state.daemon.running) || (S.teams.members||[]).length>0
  dp.className = 'pill '+(up?'on':'off'); dp.textContent = up?'daemon up':'daemon down'
  renderTabs()   // project tabs replace the old org dropdown + global needs-you pill (per-tab badges)
  if (!S.addingTo) renderMain()   // freeze the list while the add-member form is open (don't clobber inputs)
  const key = detailKey()
  if (key!==paintedKey) { renderDetail(); paintedKey=key } else patchDetail()
  renderFlash()   // keep a surfaced failure (#20) visible across re-renders until reload/dismiss
}

const label2 = (r) => r.a&&r.b ? `${r.a} ⇄ ${r.b}` : r.roomId
const roomRow = (r) => `<div class="rm ${r.roomId===S.selRoom?'sel':''}" onclick="selRoom('${esc(r.roomId)}')" title="${r.turn!=null?`${r.turn} messages exchanged${r.turnCap?` — checks in with you at ${r.turnCap}`:''}`:''}"><span class="nm">${esc(r.team||label2(r))}</span><span class="state ${r.state}">${esc(r.state)}</span><span class="meta">${esc(r.kind||'')}${r.turn?` · ${r.turn} msgs`:''}${r.unreviewed?` · ${r.unreviewed}📥`:''}</span></div>`
const teamRunning = (ms) => { const live=ms.filter(m=>m.tier==='live'); return !live.length || live.some(m=>m.online||m.launched) }

// One scrolling overview: @you (your messages) on top, then Teams, then Rooms.
function renderMain() {
  const mid = $('#mid')
  const ib = inbox()
  const byTeam = {}; for (const m of orgMembers()) (byTeam[m.team] ||= []).push(m)
  const teams = Object.keys(byTeam)
  const memberRow = (m) => { const s=memberState(m); return `<div class="mem ${m.lead?'lead':''} ${m.handle===S.selMember?'sel':''}" onclick="selMember('${esc(m.handle)}')" title="${m.tier==='worker'?'on-demand — click for activity':'click for terminal'}"><span class="dot ${s.cls}"></span><span class="who"><span class="h">@${esc(m.first)}</span> <span class="bk muted">/${esc(m.backend)}</span></span><span class="mstate ${s.cls}">${esc(s.label)}</span><span class="role">${esc(m.role)}${m.lead?' ★':''}</span></div>` }
  const teamCard = (t) => { const ms=byTeam[t]; const running=teamRunning(ms)
    return `<div class="team"><div class="tn">${esc(t)}${running?'':' <span class="state Paused" style="font-size:10px;padding:1px 6px">not running</span>'}</div>${ms.map(memberRow).join('')}
      ${S.addingTo===t ? amForm(t) : `<div class="row" style="margin-top:8px;gap:6px"><button class="btn tiny" onclick="startAddMember('${esc(t)}')">＋ add member</button></div>`}</div>` }

  // @you: open QUESTIONS (actionable, badged) first, then notifications (FYI, muted, dismiss-only),
  // then catch-ups. The header badge counts questions only — notifications never inflate it (#11).
  let html = `<h2 class="you">@you${ib.questions.length?` <span class="badge">${ib.questions.length}</span>`:''}${ib.notifications.length?` <span class="muted" style="font-weight:400;text-transform:none;letter-spacing:0">· ${ib.notifications.length} FYI</span>`:''}</h2>`
  if (ib.questions.length || ib.notifications.length || ib.cu.length) {
    html += ib.questions.map(q=>`<div class="ib slim q ${S.selInbox===q.id?'sel':''}" onclick="selInbox(${q.id})"><span class=" qicon">❓</span> <b>${esc(q.fromName||('@'+q.from))}</b> <span class="muted">· ${esc(q.room)}</span></div>`).join('')
    html += ib.notifications.map(q=>`<div class="ib slim fyi ${S.selInbox===q.id?'sel':''}" onclick="selInbox(${q.id})"><span class="qicon">🔔</span> <b>${esc(q.fromName||('@'+q.from))}</b> <span class="muted">· ${esc(q.room)}</span><span class="dismx" title="Dismiss" onclick="event.stopPropagation();dismissInbox(${q.id})">✕</span></div>`).join('')
    html += ib.cu.map(r=>`<div class="rm" onclick="selRoom('${esc(r.roomId)}',true)"><span class="nm">${esc(r.team||r.roomId)}</span><span class="meta">${r.unreviewed} catch-up${r.unreviewed>1?'s':''}</span></div>`).join('')
  } else html += `<div class="muted" style="padding:2px 6px 6px">No messages — members reach you here.</div>`
  // Recover a mis-dismissed item: a collapsed "show dismissed" toggle reveals dismissed items, which
  // re-open from the detail (activates the dismissed branch; makes the silent-clear default reversible).
  if (ib.dismissed.length) {
    html += `<div class="muted" style="padding:3px 6px;cursor:pointer;font-size:11.5px;user-select:none" onclick="toggleDismissed()">${S.showDismissed?'▾':'▸'} ${ib.dismissed.length} dismissed</div>`
    if (S.showDismissed) html += ib.dismissed.map(q=>`<div class="ib slim dism ${S.selInbox===q.id?'sel':''}" onclick="selInbox(${q.id})"><span class="qicon">${q.type==='question'?'❓':'🔔'}</span> <b>${esc(q.fromName||('@'+q.from))}</b> <span class="muted">· ${esc(q.room)}</span></div>`).join('')
  }

  // Reopen panel (T7): the active project is defined but not running → explicit ▶ Resume, with the
  // honest cold-image + per-live-member Channels-accept expectation (no surprise multi-minute spin-up).
  if (S.org && teams.length && !orgRunning(S.org)) {
    const live = orgMembers().filter(m=>m.tier==='live')
    html += `<div class="resume"><h3>⏸ "${esc(S.org)}" is stopped</h3>`
      + `<div class="step">Resume relaunches the saved team — each live member <b>--continues its own conversation</b> from where it left off.</div>`
      + `<div class="step">First run rebuilds the image (~minutes). Each live member must re-accept its one-time <b>Channels prompt in its Console</b> before it's active${live.length?`: ${live.map(m=>'@'+esc(m.first)).join(', ')}`:''}. Workers are on-demand (no accept).</div>`
      + `<div style="margin-top:10px"><button class="btn launch" onclick="resumeTeam('${esc(S.org)}')">▶ Resume team</button></div></div>`
  }

  // Telegram pairing (#12): a pending chat needs a Confirm HERE (the trust gate); linked shows Unpair.
  const tg = (S.teams.telegram||{})[S.org]
  if (tg && tg.warning) {
    // #21/#3: this project's bot token clashes with another's — its bridge did NOT start. Say so loudly
    // and actionably here instead of letting it 409-storm Telegram silently.
    html += `<div class="resume" style="border-color:#7a2630"><h3 style="color:#ffd9dc">📱 Telegram not running for ${esc(S.org)}</h3><div class="step">⚠ ${esc(tg.warning)}</div></div>`
  } else if (tg && tg.configured) {
    if (tg.pending && tg.pending.length) {
      // Name the owning project everywhere (#14 A): a misrouted /start then visibly says the WRONG
      // project, so the user cross-checks instead of blind-confirming.
      html += `<div class="resume" style="border-color:#33507e"><h3>📱 Telegram — confirm to link to ${esc(S.org)}</h3>`
        + tg.pending.map(p=>`<div class="row" style="justify-content:space-between;margin:5px 0"><span>@${esc(p.username||p.fromId)} <span class="muted">(${esc([p.firstName,p.lastName].filter(Boolean).join(' ')||'—')}, id ${esc(p.fromId)})</span> → link to <b>${esc(S.org)}</b></span><span class="row"><button class="btn tiny primary" onclick="tgConfirm('${esc(p.fromId)}')">Confirm</button> <button class="btn tiny" onclick="tgReject('${esc(p.fromId)}')">Reject</button></span></div>`).join('')
        + `<div class="step">Confirm only YOUR account — an unexpected entry is someone else who messaged the bot; Reject it.</div></div>`
    } else if (tg.pinned) {
      html += `<div class="muted" style="padding:3px 6px;font-size:11.5px">📱 Telegram linked to @${esc(tg.pinned.username||tg.pinned.fromId)}${tg.pinned.prePinned?' (.env)':''} · <a href="#" onclick="tgUnpair();return false">unpair</a></div>`
      if (tg.lastPushError) html += `<div class="bad" style="padding:2px 6px;font-size:11px">⚠ last Telegram push failed: ${esc(tg.lastPushError)} — re-link if the chat is stale.</div>`
    } else {
      html += `<div class="muted" style="padding:3px 6px;font-size:11.5px">📱 Telegram: DM the bot <code>/start</code>, then confirm here.</div>`
    }
  }

  if (teams.length) html += `<h2>Teams</h2>` + teams.map(teamCard).join('')
  const rs = mergedRooms(); const mine = rs.filter(inOrg); const others = rs.filter(r=>!inOrg(r))
  if (mine.length) html += `<h2>Rooms</h2>` + mine.map(roomRow).join('')
  if (others.length) html += `<h2>Other — consults &amp; history</h2><div style="opacity:.55">${others.map(roomRow).join('')}</div>`
  html += `<div style="margin:14px 0 8px;display:flex;gap:8px">${teams.length?`<button class="btn" style="flex:1" onclick="openBuilder()">✎ Edit teams</button>`:''}<button class="btn ${teams.length?'':'primary'}" style="flex:1" onclick="newProject()">＋ New project</button></div>`
  // Delete (#13): a DELIBERATE control distinct from the tab ✕ (which only suspends). Forgets the
  // project from the daemon + stops its sessions; deletes nothing on disk — re-addable via `mrc team up`.
  if (S.org && teams.length) html += `<div style="margin:0 0 18px"><button class="btn danger tiny" onclick="deleteProject()">🗑 Delete project</button></div>`
  if ((S.sessions||[]).length) {
    html += `<h2>Sessions <span class="muted" style="text-transform:none;letter-spacing:0">· all mrc containers</span></h2>`
    html += S.sessions.map(s=>`<div class="rm" style="cursor:default"><span class="nm">${esc(s.member?('@'+s.member):s.repo)}</span><span class="meta">${esc(s.project||s.repo)} · ${esc(s.up||'')}</span><button class="btn tiny danger" style="margin-left:8px" onclick="killSession('${esc(s.id)}','${esc(s.member||s.repo)}')">kill</button></div>`).join('')
  }
  html += `<div style="height:18px"></div>`
  mid.innerHTML = html
}

// Stick-to-bottom ONLY when the user is already near the bottom (chat/log pattern). If they've scrolled
// UP to read history, a 1.5s live update must NOT yank their viewport — to the bottom OR to the top.
// We capture before the mutation and follow-or-restore after (restore is a no-op when textContent is
// mutated in place, and corrects an innerHTML-style reset — so it's safe either way).
function followScroll(el, mutate) {
  const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 40
  const keepTop = el.scrollTop
  mutate()
  el.scrollTop = atBottom ? el.scrollHeight : keepTop
}

// Render the raw thread.log into per-message lines, turning the DAEMON's EOL `[#N]` (question) into a
// jump ANCHOR (id="q<N>") and its `(re #N)` (reply) into a clickable jump (#18). Only the daemon's
// exact-EOL token is treated as a marker — a member's `#5`/`[#5]` in prose is plain esc()'d text, never
// an anchor. Ids are deduped (first wins) so the DOM never has a duplicate anchor to hijack a jump.
function threadHTML(raw) {
  const seen = new Set()
  return String(raw||'').split('\n').map(line => {
    if (!line) return '<div class="tline"> </div>'
    let m = line.match(/^(.*) \[#(\d+)\]$/)
    if (m) { const id=m[2], anchor = !seen.has(id); if(anchor) seen.add(id)
      return `<div class="tline"${anchor?` id="q${id}"`:''}>${esc(m[1])} <span class="qnum">[#${id}]</span></div>` }
    m = line.match(/^(.*) \(re #(\d+)\)$/)
    if (m) return `<div class="tline">${esc(m[1])} <a class="qjump" onclick="jumpToQ(${m[2]})" title="jump to question #${m[2]}">re #${m[2]}</a></div>`
    return `<div class="tline">${esc(line)}</div>`
  }).join('')
}
window.jumpToQ = (id)=>{ const el=$('#q'+id); if(!el)return; el.scrollIntoView({block:'center',behavior:'smooth'}); el.classList.add('qhi'); setTimeout(()=>el.classList.remove('qhi'),1400) }
function renderTab() {
  const b = $('#tabbody'); if (!b) return
  if (S.tab==='thread') { const raw=(S.room&&S.room.thread)||''; b.innerHTML = `<div class="thread" id="thread" tabindex="0">${raw?threadHTML(raw):'(no messages yet)'}</div>`; const t=$('#thread'); if(t){ t.dataset.raw=raw; t.scrollTop=t.scrollHeight } }
  else if (S.tab==='summary') b.innerHTML = `<pre class="thread" id="summary">${esc((S.room&&S.room.consensus)||'(no summary)')}</pre>`
  else {
    const cu = (S.room&&S.room.catchups)||[]
    b.innerHTML = cu.length ? [...cu].reverse().map(c=>`<div class="pane ${(c.status==='ready'&&!c.reviewedAt)?'unrev':''}">
      <div class="row" style="justify-content:space-between"><b>Catch-up #${c.seq}</b> <span class="muted">${esc(c.pauseReason||'')} · ${c.status}${c.reviewedAt?' · reviewed':''}</span></div>
      ${Object.values(c.handoffs||{}).map(h=>`<div class="card"><b>${esc(h.name||'')}</b>\n${esc(h.text||'')}</div>`).join('')||'<div class="muted">waiting for handoffs…</div>'}
      ${(c.status==='ready'&&!c.reviewedAt)?`<button class="btn tiny" onclick="reviewCu(${c.seq})">Mark reviewed</button>`:''}</div>`).join('')
      : `<div class="muted">No catch-ups. (Auto handoffs fire when a room pauses; mainly used by 2-party consults today.)</div>`
  }
}
function renderInboxItem(d) {
  const q = (S.teams.userInbox||[]).find(x=>x.id===S.selInbox)   // stable id, not array index
  if (!q) { d.innerHTML = `<div class="empty">Message gone.</div>`; return }
  const isQ = q.type==='question'
  const head = isQ ? '❓ A member needs you' : '🔔 Notification'
  const done = q.answered ? `<div class="muted">↳ ${esc(q.answer||'')}</div>`
    : q.dismissed ? `<div class="muted">↳ dismissed — re-open to act on it</div>` : ''
  // EVERY open item is replyable (#15) — a reply routes a [Human reply] via answerUser (open-revalidation
  // stale-guards a double-answer). A notification differs only in framing ("reply optional", it never
  // badges) — not in capability. Dismiss clears without replying (instant on a notification, confirmed
  // on a question — handled in dismissInbox). Dismissed → ↺ Re-open. All keep "Open room".
  const actions = q.answered ? `<div style="margin-top:8px"><button class="btn" onclick="openRoom('${esc(q.roomId)}')">Open room</button></div>`
    : q.dismissed ? `<div class="row" style="margin-top:8px"><button class="btn primary" onclick="reopenInbox(${S.selInbox})">↺ Re-open</button> <button class="btn" onclick="openRoom('${esc(q.roomId)}')">Open room</button></div>`
    : `${isQ ? '' : '<div class="muted" style="margin:6px 0">FYI — reply optional.</div>'}<textarea id="ansTx" placeholder="Your reply (routes back as [Human reply])…"></textarea><div class="row" style="margin-top:8px"><button class="btn primary" onclick="answer(${S.selInbox})">Send reply</button> <button class="btn" onclick="dismissInbox(${S.selInbox})">✕ Dismiss</button> <button class="btn" onclick="openRoom('${esc(q.roomId)}')">Open room</button></div>`
  d.innerHTML = `<h2>${head}</h2>
    <div class="pane ${isQ?'':'fyi'}"><div class="who muted"><b style="color:var(--fg)">${esc(q.fromName||('@'+q.from))}</b> in <b>${esc(q.room)}</b></div>
    <div style="margin:8px 0;white-space:pre-wrap">${esc(q.text)}</div>
    ${done}${actions}</div>`
}

let bTimer=null
function bPreview(){clearTimeout(bTimer);bTimer=setTimeout(async()=>{

    +(v.warnings.length?`<h2>Warnings</h2>`+v.warnings.map(w=>`<div class="warn" style="font-size:12px">⚠ ${esc(w)}</div>`).join(''):'')

// #20: confirm the reply landed (2xx) BEFORE closing the panel. A 403 (stale token) / network / 500 keeps
// the item open and surfaces the error — never optimistic-close (that was the silent-swallow @user hit).
window.answer = async (i)=>{ const tx=$('#ansTx'); if(!tx||!tx.value.trim())return; const r=await act('answer',{i,text:tx.value.trim()}); if(!r.ok)return flashFail(r); S.flash=null; S.selInbox=null; tick() }
// Dismiss without replying (#11). A QUESTION is a permanent-loss-on-misclick path → confirm first
// (the ✕ sits next to Send reply); a NOTIFICATION is fast FYI triage → instant, no confirm.
window.dismissInbox = async (id)=>{
  const it = (S.teams.userInbox||[]).find(x=>x.id===id)
  if (it && it.type==='question' && !confirm(`Dismiss without replying? ${it.fromName||('@'+it.from)} won't get an answer. (You can re-open it later from "show dismissed".)`)) return
  const r = await act('dismiss',{i:id}); if(!r.ok)return flashFail(r)   // keep it if the dismiss didn't land (#20)
  S.flash=null; if(S.selInbox===id)S.selInbox=null; tick()
}
window.reopenInbox = async (i)=>{ const r=await act('reopen',{i}); if(!r.ok)return flashFail(r); S.flash=null; tick() }   // undo a dismiss → actionable again
// Telegram pairing (#12): Confirm is the trust gate (on the localhost dashboard); Reject/Unpair too.
window.tgConfirm = async (fromId)=>{ const r=await actJSON('/api/tg',{action:'tgconfirm',org:S.org,fromId:Number(fromId)}); if(!r.ok)return flashFail(r); S.flash=null; tick() }
window.tgReject = async (fromId)=>{ const r=await actJSON('/api/tg',{action:'tgreject',org:S.org,fromId:Number(fromId)}); if(!r.ok)return flashFail(r); S.flash=null; tick() }
window.tgUnpair = async ()=>{ if(!confirm('Unpair Telegram? The linked chat stops receiving questions until you re-link.'))return; const r=await actJSON('/api/tg',{action:'tgunpair',org:S.org}); if(!r.ok)return flashFail(r); S.flash=null; tick() }
// Delete project (#13): forget it from the daemon + stop sessions; nothing on disk is deleted.
window.deleteProject = async ()=>{ const org=S.org; if(!org||!confirm(`Delete "${org}" from Mister Claude? Its sessions stop and the tab is removed. Nothing on disk is deleted — your transcripts and team.json stay, so you can re-add it any time with \`mrc team up\`.`))return; const r=await actJSON('/api/team-delete',{org}); if(!r.ok)return flashFail(r); S.flash=null; S.org=null; S.selRoom=S.selInbox=S.selMember=null; S.building=false; tick() }
window.toggleDismissed = ()=>{ S.showDismissed=!S.showDismissed; paint() }
window.stopTeam = async ()=>{ if(!confirm('Stop the team? This closes all member terminals.'))return; const r=await actJSON('/api/team-stop',{org:S.org}); if(!r.ok)return flashFail(r); S.flash=null; tick() }
window.removeMember = async (h, first)=>{ if(!confirm('Remove @'+first+' from the team? (updates team.json)'))return; const r=await actJSON('/api/team-remove-member',{org:S.org,handle:h}); if(!r.ok)return flashFail(r); S.flash=null; S.selMember=null; tick() }
window.killSession = async (id, name)=>{ if(!confirm('Kill container '+name+'? (force-removes it)'))return; const r=await actJSON('/api/kill-session',{id}); if(!r.ok)return flashFail(r); S.flash=null; S._tick=0; tick() }
window.bLaunch = async ()=>{ const msg=$('#bMsg'); if(!msg)return; msg.innerHTML='<span class="muted">launching… first run builds the image (~minutes)</span>'
  const r=await postJSON('/api/team-launch',{roster:bRoster()})
  if(r&&r.ok){ msg.innerHTML='<span class="good">🚀 launching — pick each member to open its terminal and log in</span>'; S.org=bRoster().org||null; setOrgUrl(S.org); setTimeout(()=>{S.building=false;tick()},700) }
  else msg.innerHTML=`<span class="bad">✗ ${esc((r&&r.error)||'failed')}</span>` }

// Scoped launch (mrc gui [repo]): pre-fill the builder from ?repo=&org=, then land on Build (or Teams
// if a team for that org already exists — decided after the first data load).
const _q = new URLSearchParams(location.search)
const _qRepo = _q.get('repo')
const _proj = decodeURIComponent(location.pathname.replace(/^\/+/, '').split('/')[0] || '')   // /anigame -> anigame
if (_proj) { S.org = _proj; S.builder.org = _proj }       // path is the project -> jump straight to it
if (_qRepo) { S.builder.repo = _qRepo }
let _scopedNav = !!_qRepo
tick(); setInterval(tick, 1500)
</script>
</body>
</html>
