<title>Mister Claude</title>
<style>
  /* #2a — ONE source of truth. Tokens are named by MEANING, not appearance: several are the same hue
     today but kept SEPARATE so Côme's 2b palette can diverge any one without re-blurring a distinction
     (per Sandrine's semantic contract + Roland's no-op gate — every value here equals today's). */
  :root {
    /* surfaces */
    --bg:#0f1115; --panel:#171a21; --panel2:#1d212b; --line:#262b36; --inset:#0b0d12; --field:#11141b;
    /* text */
    --fg:#e6e9ef; --dim:#8b93a3;
    /* #2b — Mr. Claude palette (derived from Côme's swatches by INTENT, WCAG-AA on the dark base).
       Two learnable hue families: PURPLE = brand / attention (the top-hat), BLUE = navigate / info. */
    --accent:#a78bfa;   /* brand / active selection — the top-hat purple */
    --link:#6aa0f5;     /* hyperlinks (navigate) */
    --info:#5b9cf6;     /* 🔗 Telegram-pending / informational (blue — NOT the purple needs-you) */
    --worker:#6aa0f5;   /* worker (on-demand) state */
    /* status — perceptually distinct AND semantically mapped (green≈good, amber≈attention, red≈bad) */
    --online:#5ec878;   /* ready / running / online */
    --starting:#e6a23c; /* starting / attention */
    --warning:#e6a23c;  /* warning / paused */
    --danger:#f2607a;   /* offline / error / destructive */
    /* needs-you family — purple (brand-attention); three DISTINCT meanings */
    --needs-you:#c4a6ff; /* ❓ needs-you / @you — the brightest "ping" */
    --lead:#b39ddb;      /* lead member */
    --ref:#b8a4f0;       /* [#N] reference chip */
    /* A11Y GUARDRAIL (Sandrine's contract pt 3): purple↔blue compresses under red-green colorblindness,
       so 🔗-info(blue) vs ❓-needs-you(purple), and the three close purples (needs-you/lead/ref), are NOT
       reliably separable by COLOR alone — the GLYPH/context channel (🔗 ❓ ● ✓ ✕, position) is load-bearing.
       Never drop those glyphs for a "cleaner" color-only treatment in a polish pass. */
    /* legacy aliases so existing .good/.warn/.bad/.state/pills keep their exact look */
    --good:var(--online); --warn:var(--warning); --bad:var(--danger);
    /* semantic surfaces (bg / border / fg) for buttons, badges, flashes — unifies the ad-hoc accents */
    --info-bg:#23314d; --info-border:#33507e; --info-fg:#cfe0ff;
    --danger-bg:#2a1b21; --danger-border:#5a3540; --danger-fg:#f4a6b4;
    --success-bg:#1f3a26; --success-border:#2f6b3f; --success-fg:#bfe6c8;
    --needs-bg:#3a2f4f; --needs-fg:#d7c5f5;          /* soft needs-you badge */
    --needs-edge:#5a4a7a; --needs-edge-fg:#e7dcff;   /* brighter needs-you: tab badge + needs-you panel borders */
    /* rhythm (8px scale) + radius — defined now for 2b; adopted value-preserving where it matches */
    --sp1:4px; --sp2:8px; --sp3:12px; --sp4:16px; --sp5:24px; --sp6:32px;
    --radius:10px; --radius-sm:7px; --radius-pill:999px;
  }
  * { box-sizing:border-box }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; height:100vh; overflow:hidden }
  code,pre,.mono { font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace }
  a { color:var(--link); text-decoration:none }
  .tgunpair:hover { text-decoration:underline }   /* subtle at rest (dim, no underline), discoverable on hover for a state-changing action */
  /* layout */
  .app { display:grid; grid-template-rows:50px 1fr; height:100vh }
  header { display:flex; align-items:center; gap:12px; padding:0 16px; border-bottom:1px solid var(--line); background:var(--panel) }
  /* Title in Silkscreen (pixel) recolored to brand purple — @user's wordmark option-2. Pixel fonts
     read larger/wider than mono, so a slightly smaller size + tighter line. Falls back to mono offline. */
  header h1 { font-family:'Silkscreen', ui-monospace, SFMono-Regular, monospace; font-size:13px; margin:0; font-weight:400; letter-spacing:.3px; color:var(--accent); display:flex; align-items:center; gap:8px }
  .hatmark { fill:var(--accent); flex:0 0 auto; filter:drop-shadow(0 1px 2px rgba(0,0,0,.4)) }   /* the Mr. Claude top-hat (favicon, brand purple) */
  /* 🔔 notification toggle — 3-state (off / on / blocked); on = brand accent, blocked = warning */
  button.pill { background:transparent; cursor:pointer; font-family:inherit; line-height:1.6 }
  .pill.notif.on { color:var(--accent); border-color:var(--accent) }
  .pill.notif.blocked { color:var(--warning); border-color:#4a3a22 }
  header .spacer { flex:1 }
  .main { display:grid; grid-template-columns:340px 1fr; min-height:0 }
  .list { border-right:1px solid var(--line); overflow:auto; padding:10px }
  .detail { display:flex; flex-direction:column; overflow:auto; padding:16px 20px; min-width:0; min-height:0 }
  /* #40: persistent terminal host — overlays the detail cell (col 2) so member iframes survive a
     re-render / member-switch (no remount = no blank/reconnect). One keep-alive iframe per org+handle. */
  #termhost { grid-column:2; grid-row:1; display:none; flex-direction:column; overflow:hidden; padding:16px 20px; min-width:0; min-height:0; background:var(--bg) }
  #detail { grid-column:2; grid-row:1 }
  .termblock { display:none; flex-direction:column; flex:1 1 0; min-height:0 }
  .termhdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px }
  .termframe { width:100%; flex:1 1 0; min-height:0; border:1px solid var(--line); border-radius:8px; background:#000 }
  .termfoot { margin-top:6px }
  .detail > * { flex-shrink:0 }   /* flowing views keep natural height + the pane scrolls; fill children (#tabbody / the iframe) override below */
  #tabbody { flex:1 1 0; min-height:0; display:flex; flex-direction:column; overflow:auto }   /* transcript/summary fill the remaining height; catch-up cards scroll */
  /* pills / badges */
  .pill { font-size:11px; padding:2px 8px; border-radius:999px; border:1px solid var(--line); color:var(--dim) }
  .pill.on { color:var(--good); border-color:#2c4533 } .pill.off { color:var(--bad); border-color:#4a2a31 }
  /* #46: header gear → Settings modal */
  .pill.gear { font-size:13px; padding:1px 7px; line-height:1.3 }
  .pill.gear:hover, .pill.gear[aria-expanded="true"] { color:var(--accent); border-color:var(--accent) }
  #modal:empty { display:none }
  .scrim { position:fixed; inset:0; z-index:900; background:rgba(0,0,0,.55); display:flex; align-items:flex-start; justify-content:center; padding:48px 16px; overflow:auto }
  .modalcard { background:var(--panel); border:1px solid var(--line); border-radius:12px; max-width:520px; width:calc(100% - 32px); max-height:calc(100vh - 96px); display:flex; flex-direction:column; box-shadow:0 12px 40px rgba(0,0,0,.5) }
  .modalcard:focus { outline:none }
  .modalhead { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--line) }
  .modalbody { padding:14px 16px; overflow:auto }
  .sgrouph { font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--dim); margin:0 0 8px }
  .sblk.danger { border-color:var(--danger) }
  .badge { font-size:10px; background:var(--needs-bg); color:var(--needs-fg); border-radius:var(--radius-pill); padding:0 6px; margin-left:auto }
  .state { font-size:10px; padding:1px 7px; border-radius:6px; border:1px solid var(--line); color:var(--dim) }
  .state.Running { color:var(--good) } .state.Paused { color:var(--warn) } .state.History { color:var(--dim) }
  h2 { font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--dim); margin:16px 0 8px } h2:first-child { margin-top:4px }
  h2.you { color:var(--needs-you); font-size:12px; display:flex; align-items:center; gap:8px } h2.you .badge { margin-left:0 }
  .dim { color:var(--dim) } .muted { color:var(--dim); font-size:12px } .good{color:var(--good)} .bad{color:var(--bad)} .warn{color:var(--warn)}
  .h { font-family:ui-monospace,monospace; font-size:12.5px }
  .dot { width:8px; height:8px; border-radius:50%; background:#3a4150; display:inline-block; flex:0 0 auto }
  .dot.online, .dot.ready { background:var(--good); box-shadow:0 0 6px #7bd88f88 }
  .dot.starting { background:var(--warn); box-shadow:0 0 7px #e0af68aa; animation:pulse 1.2s ease-in-out infinite }
  .dot.worker { background:var(--worker) } .dot.off { background:#3a4150 }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .mstate { font-size:10.5px; margin-left:6px; white-space:nowrap }
  .mstate.ready{color:var(--good)} .mstate.starting{color:var(--warn)} .mstate.worker{color:var(--worker)} .mstate.off{color:var(--dim)}
  /* cards */
  .team { background:var(--panel); border:1px solid var(--line); border-radius:11px; padding:12px 12px 10px; margin-bottom:12px }
  /* settings tab (#42c) */
  .sblk { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:11px 13px; margin-bottom:12px }
  .sblk .srow { display:flex; align-items:center; gap:7px; flex-wrap:wrap }
  .sblk .srow b { font-size:14px }
  .sblk .shelp { color:var(--dim); font-size:12px; margin:4px 0 8px; line-height:1.45 }
  .setck { display:flex; align-items:center; gap:7px; font-size:13px; color:var(--fg); margin:3px 0 } .setck input { width:auto }
  .stag { font-size:9.5px; font-weight:700; letter-spacing:.04em; padding:2px 6px; border-radius:4px; border:1px solid var(--line); white-space:nowrap }
  .stag.g { color:var(--accent); border-color:var(--accent) } .stag.p { color:var(--info); border-color:var(--info) }
  .stag.r { color:var(--online); border-color:var(--online) } .stag.l { color:var(--warning); border-color:var(--warning) }
  .team .tn { font-weight:650; font-size:13px; margin-bottom:8px; padding:0 2px; display:flex; gap:8px; align-items:center }
  /* member cards (Côme's mockup): dot · name (bold, line 1, no truncation) / role (dim, line 2) · status,
     with a reserved slim slot on the right for the future per-member bar (not populated yet). */
  .mem { display:flex; align-items:center; gap:11px; padding:9px 11px; cursor:pointer; border:1px solid var(--line); border-radius:9px; background:var(--panel) }
  .mem + .mem { margin-top:6px }
  .mem:hover { background:var(--panel2); border-color:#3a4150 } .mem.sel { background:var(--panel2); border-color:var(--accent) }
  .mem .dot { width:10px; height:10px }
  .mem .who { flex:1; min-width:0; display:flex; flex-direction:column; gap:1px }
  .mem .who .nm { font-size:14px; font-weight:650; text-transform:capitalize; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.25 }   /* full name (nowrap); ellipsis only catches a pathological long CUSTOM name, never the curated pool */
  .mem .who .role { font-size:11.5px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.25 }
  .mem .who .role .bk { opacity:.8 }
  .mem.lead .who .nm { color:var(--lead) } .mem .leadstar { color:var(--lead); font-size:11px }
  .mem .mstate { flex:0 0 auto; font-size:10.5px; text-align:right; margin-left:0 }
  .mem .membar { flex:0 0 3px; align-self:stretch; border-radius:2px; background:transparent }   /* reserved: future per-member bar (empty for now) */
  .rm { display:flex; align-items:center; gap:8px; padding:7px 9px; border:1px solid var(--line); border-radius:8px; margin:6px 0; cursor:pointer; background:var(--panel) }
  .rm:hover { border-color:#37506e } .rm.sel { border-color:var(--accent); background:var(--panel2) }
  .rm .nm { font-weight:600; font-size:13px } .rm .meta { color:var(--dim); font-size:11px; margin-left:auto }
  .ib { border:1px solid #3a2f4f; background:#1a1622; border-radius:9px; padding:9px 11px; margin-bottom:7px; cursor:pointer }
  .ib.slim { padding:6px 10px; font-size:13px; display:flex; align-items:center; gap:5px } .ib.slim:hover { border-color:#6a5a8a }

<script>
const $ = (s, r=document) => r.querySelector(s)
// Escapes & < > " AND ' (→ &#39;). Including the apostrophe closes the latent class where a future
// edit puts an attacker-controllable string into a single-quoted JS context (onclick="f('${esc(x)}')"):
// &#39; HTML-decodes correctly in text, double- AND single-quoted attributes, so esc() is safe in every
// context the dashboard uses — no caller has to remember which quote style it's in.
const esc = (s) => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
const MRC_TOKEN = (document.querySelector('meta[name=mrc-token]')||{}).content || ''
// Attach the CSRF token to every non-GET request (POST state-changers). A cross-origin page can't read
// MRC_TOKEN (same-origin policy), so it can't forge these. The token is now persisted across daemon
// restarts (#20) so an open tab keeps validating; if it ever still mismatches (HTTP 403), api() stamps
// `_status` so callers can surface a "reload to continue" banner instead of silently swallowing.
const api = (p, o) => {
  if (o && String(o.method||'GET').toUpperCase() !== 'GET') o = { ...o, headers: { ...(o.headers||{}), 'X-MRC-Token': MRC_TOKEN } }
  return fetch(p, o).then(async r => {
    let j; try { j = await r.json() } catch { j = {} }
    if (!r.ok) { if (j.ok===undefined) j.ok = false; j._status = r.status }   // surface HTTP-level failure (403/5xx)
    return j
  })
}
const post = (action, extra={}) => api('/api/action', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ action, ...extra }) })
const postJSON = (path, obj={}) => api(path, { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(obj) })

// State-changing actions MUST confirm success before the UI clears/closes — no optimistic-close (#20).
// act()/actJSON() never throw: a network reject (daemon mid-restart) and a non-2xx both resolve to
// {ok:false,...}. Callers check .ok and only close on success; on failure they keep the item and call
// flashFail(), which surfaces the error — a rotated/again-mismatched token (403) shows a persistent
// "reload to continue" banner; anything else a dismissable error. This is the no-silent-failure floor:
// even with the token persisted, a network blip / 500 / mid-restart must never be swallowed.
const normResult = (r) => (r && r.ok) ? { ok:true } : { ok:false, status: r && r._status, error: (r && r.error) || 'action failed' }
async function act(action, extra={}) { try { return normResult(await post(action, extra)) } catch { return { ok:false, error:'network error — the daemon may be restarting' } } }
async function actJSON(path, obj={}) { try { return normResult(await postJSON(path, obj)) } catch { return { ok:false, error:'network error — the daemon may be restarting' } } }
const isStale = (r) => r && (r.status===403 || /forbidden|x-mrc-token|reload the dashboard/i.test(r.error||''))
function flashFail(r) { S.flash = isStale(r) ? { kind:'stale' } : { kind:'err', text:(r&&r.error)||'action failed' }; renderFlash() }
function renderFlash() {
  const el = $('#flash'); if (!el) return
  if (!S.flash) { el.innerHTML=''; return }
  el.innerHTML = S.flash.kind==='stale'
    ? `<div class="fl stale">⟳ Session refreshed — the daemon restarted. Reload to continue.<button class="btn primary" onclick="location.reload()">Reload</button></div>`
    : S.flash.kind==='note'
    ? `<div class="fl note">ℹ ${esc(S.flash.text)}<span class="x" title="dismiss" onclick="dismissFlash()">✕</span></div>`
    : `<div class="fl err">⚠ ${esc(S.flash.text)}<span class="x" title="dismiss" onclick="dismissFlash()">✕</span></div>`
}
window.dismissFlash = () => { S.flash=null; renderFlash() }
const setOrgUrl = (org) => { try { history.replaceState(null, '', '/'+encodeURIComponent(org||'')) } catch {} }   // /anigame

const ROLES = ['architect','engineer','critic','adversary','ultracritical','user-defender','researcher','tester','designer','sound-designer','composer']
const BACKENDS = ['claude','codex']   // agent backends only — media roles DERIVE their backend (below)
// #42: the role chooser lists built-in roles PLUS this project's custom personas (so a member can pick
// @advertiser). Custom keys that shadow a built-in are de-duped (the parser already forbids alias/media
// shadows, so the only real overlap is an agent-role override, which we show once).
const customRoleKeys = () => Object.keys((S.builder&&S.builder.personas)||{})
const roleOptions = () => ROLES.concat(customRoleKeys().filter(k=>!ROLES.includes(k)))
const aliasRole = (r) => r==='writer'?'engineer':(r==='qa'?'tester':r)
// #44: member-naming. SAFE_NAME mirrors roster.js assertSafeName (#36) for the inline field error — the
// server boundary (parseRoster/team-preview) still enforces it; this is defense-in-depth + fast feedback.
const SAFE_NAME_RE = /^[\p{L}\p{N}](?:[\p{L}\p{N}-]*[\p{L}\p{N}])?$/u
const allBuilderNames = ()=>{ const s=new Set(); for(const t of (S.builder.teams||[])) for(const m of (t.members||[])) if(m.name) s.add(String(m.name).toLowerCase()); return s }
function suggestName(style, taken){ const pool=S.namePools&&S.namePools.pools&&S.namePools.pools[style]; if(!pool||!pool.length) return ''
  const free=pool.filter(n=>!taken.has(n.toLowerCase())); if(free.length) return free[Math.floor(Math.random()*free.length)]
  for(let i=2;;i++){ const c=pool[Math.floor(Math.random()*pool.length)]+i; if(!taken.has(c.toLowerCase())) return c } }
// Fill suggested names for AUTO members (those not hand-typed). Idempotent by default: only fills EMPTY
// auto names (so a re-render never re-rolls a stable name). force=true (style change) clears auto names
// first for a full re-roll. 'custom' style = free-type → leave auto names blank.
function autofillNames(force){ const style=S.builder.nameStyle||'french'
  if(force) for(const t of (S.builder.teams||[])) for(const m of (t.members||[])) if(m._nameAuto!==false) m.name=''
  if(style==='custom' || !S.namePools) return
  for(const t of (S.builder.teams||[])) for(const m of (t.members||[])) if(m._nameAuto!==false && !m.name) m.name=suggestName(style, allBuilderNames()) }
// Which builder members currently resolve to a custom persona key (honoring writer/qa aliases) — the
// local mirror of the server's removal refusal, so the UI warns before the round-trip.
const membersUsingPersona = (k)=>{const out=[];for(const t of ((S.builder&&S.builder.teams)||[]))for(const m of (t.members||[]))if(aliasRole(m.role)===k)out.push((m.role||'engineer')+'@'+(t.name||'?'));return out}
// A media role's backend is fixed by the role (mirrors roster.js/media.js), not a free pick.
const MEDIA_ROLE_BACKEND = { designer:'gemini', 'sound-designer':'elevenlabs', composer:'elevenlabs' }
const mediaBackend = (role) => MEDIA_ROLE_BACKEND[role] || null

const S = {
  building: false, org: null, selRoom: null, selInbox: null, selMember: null, settingsOpen: false, settings: null, workerLog: '', tab: 'thread', addingTo: null, addCustomRoles: [], showDismissed: false, flash: null,
  notifyEnabled: (()=>{ try { return localStorage.getItem('mrc-notify')==='1' } catch { return false } })(),
  notifyPrefs: { chime:true, questions:true, fyis:true },   // server-backed (#42c); loaded once on boot, defaults preserve prior behavior
  teams: { members:[], rooms:[], userInbox:[], orgs:[] }, state: { rooms:[], daemon:{} }, room: null,
  namePools: null,   // #44: {styles, pools} from /api/names, loaded once when the builder opens
  builder: { org:'shop', repo:'', personas:{}, _pEdit:null, nameStyle:'french', teams:[ { name:'client', territory:'client', members:[
    {role:'architect',backend:'claude',lead:true,territory:''},{role:'engineer',backend:'claude',lead:false,territory:''},{role:'critic',backend:'claude',lead:false,territory:''} ] } ] },
}
let paintedKey = null

// ---- data ----
let _prefsLoaded = false
async function tick() {
  if (!_prefsLoaded) { _prefsLoaded = true; api('/api/settings').then(r=>{ if (r && r.ok && r.notify && r.notify.value) S.notifyPrefs = r.notify.value }).catch(()=>{}) }   // #42c: load notify prefs once for the OS-notify gate
  const [t, st] = await Promise.all([ api('/api/teams').catch(()=>S.teams), api('/api/state').catch(()=>S.state) ])
  S.teams = t && t.members ? t : { members:[], rooms:[], userInbox:[], orgs:[] }
  S.state = st && st.rooms ? st : { rooms:[], daemon:{} }
  if (!S.org) S.org = (S.teams.orgs && S.teams.orgs[0] && S.teams.orgs[0].org) || null
  if (_scopedNav) { _scopedNav=false; const has=(S.teams.members||[]).some(m=>!_proj||m.org===_proj); S.building = !has; if (has && _proj) S.org=_proj }
  if (S.selRoom && needRoomFetch()) S.room = await api('/api/room?id='+encodeURIComponent(S.selRoom)).catch(()=>null)
  if (S.selMember) {
    const m = memberByHandle(S.selMember)
    if (m && m.tier==='worker') {
      const r = await api('/api/worker-log?handle='+encodeURIComponent(m.handle)+'&org='+encodeURIComponent(m.org||S.org||'')).catch(()=>null)
      let log = r && r.ok ? (r.log||'') : ''
      if (!log) {   // fallback: scrape the team transcript for this worker (works on any daemon)
        const room = mergedRooms().find(rr=>rr.team===m.team && rr.kind==='team')
        const rd = room ? await api('/api/room?id='+encodeURIComponent(room.roomId)).catch(()=>null) : null
        if (rd) log = (rd.thread||'').split('\n').filter(l=>l.toLowerCase().includes(m.first.toLowerCase())).join('\n')
      }
      S.workerLog = log
    }
  }
  notifyNewInbox(S.teams.userInbox || [])   // fire OS notifications for @you items that arrived since the last tick
  paint()
}
const needRoomFetch = () => !S.building

// merge live engine team rooms with all room dirs (consult pairings + history)
function mergedRooms() {
  const eng = new Map((S.teams.rooms||[]).map(r => [r.roomId, { ...r, live:true, source:'team' }]))
  const out = []
  for (const r of (S.state.rooms||[])) {
    const e = eng.get(r.roomId)
    if (e) { out.push({ ...e, unreviewed:r.unreviewed, updatedAt:r.updatedAt }); eng.delete(r.roomId) }
    else out.push({ roomId:r.roomId, team:null, kind:(r.a&&r.b?'consult':'room'), state:r.state, live:!!r.live, turn:r.turn, members:[], unreviewed:r.unreviewed||0, updatedAt:r.updatedAt||0, a:r.a, b:r.b, source:'room' })
  }
  for (const e of eng.values()) out.push({ ...e, unreviewed:0, updatedAt:Date.now() })
  return out.sort((x,y)=>(Number((y.unreviewed||0)>0)-Number((x.unreviewed||0)>0))||(Number(!!y.live)-Number(!!x.live))||((y.updatedAt||0)-(x.updatedAt||0)))
}
const inOrg = (r) => !S.org || r.org===S.org   // team rooms carry org; org-less consults are NOT in any org
const orgMembers = () => (S.teams.members||[]).filter(m => !S.org || !m.org || m.org===S.org)
function inbox() {
  // Scope the @you queue to the ACTIVE project — items carry their org (#8). An item is OPEN until
  // answered or dismissed (#11). Questions (ask_user) are actionable; notifications (plain @user) are
  // FYI — split so they render + count differently. Legacy/undefined type → notification (safe default).
  const all = (S.teams.userInbox||[]).filter(q => q.org===S.org)
  const open = all.filter(q => !q.answered && !q.dismissed)
  const questions = open.filter(q => q.type==='question')
  const notifications = open.filter(q => q.type!=='question')
  const dismissed = all.filter(q => q.dismissed && !q.answered)   // recoverable via the show-dismissed toggle
  const cu = mergedRooms().filter(r => (r.unreviewed||0)>0 && inOrg(r))
  return { all, open, questions, notifications, dismissed, cu, need: questions.length + cu.reduce((a,c)=>a+(c.unreviewed||0),0) }
}
// Per-project needs-you count (drives each tab's badge): open QUESTIONS only + unreviewed catch-ups in
// that org — notifications never nag. Strict org match (harmonized with inbox()). Derived, not stored.
function orgNeed(org) {
  const qs = (S.teams.userInbox||[]).filter(q => q.org===org && q.type==='question' && !q.answered && !q.dismissed).length
  const cu = mergedRooms().filter(r => (r.unreviewed||0)>0 && r.org===org).reduce((a,c)=>a+(c.unreviewed||0),0)
  return qs + cu
}
// A project is "running" if it has a launch record or any live member up (online/launched).
// A launch record only counts as "running" if the daemon reconciled it as live (≥1 member session up,
// or still building) — a stale record from a crash reports running:false, so ▶ Resume/🚀 Launch comes back.
const orgRunning = (org) => (S.teams.launch||[]).some(l=>l.org===org && l.running) || (S.teams.members||[]).some(m=>m.org===org && m.tier==='live' && (m.online||m.launched))
function switchOrg(org) { if (org===S.org) return; S.org=org; S.selRoom=S.selInbox=S.selMember=null; S.building=false; setOrgUrl(org); paint() }
window.switchOrg = switchOrg

// Browser-style project tabs: one per defined org. Chrome-stable — tabs keep a FIXED position
// (definition order); SELECTING a tab only changes which is highlighted, it never reorders the strip
// (a tab jumping to the front on click was the instability @user flagged). Many tabs → the strip
// scrolls horizontally and the active one is scrolled into view (no truncation/overflow menu, so the
// active tab is always reachable without moving anything). Each tab: state dot, needs-you badge, an ✕
// that SUSPENDS (stop + preserve), and a trailing ＋ → Build.
function renderTabs() {
  const el = $('#tabs'); if (!el) return
  const orgs = (S.teams.orgs||[]).map(o=>o.org)   // STABLE order — never re-sorted by active/running state
  const tab = (o) => {
    const need = orgNeed(o), cls = o===S.org ? 'active' : orgRunning(o) ? 'running' : 'closed'
    // A pending Telegram link is a "verify me" event — surfaced on the OWNING tab regardless of which
    // tab is active (#14 B), and visually DISTINCT from the ❓ needs-you badge (a 🔗, not an answer count).
    const link = (S.teams.telegram||{})[o]?.pending?.length || 0
    return `<div class="ptab ${cls}" onclick="switchOrg('${esc(o)}')" title="${esc(o)} · ${orgRunning(o)?'running':'stopped'}">`
      + `<span class="pdot"></span><span class="pname">${esc(o)}</span>`
      + (link?`<span class="plink" title="Telegram link awaiting your confirmation${link>1?` (${link})`:''}">🔗${link>1?link:''}</span>`:'')
      + (need?`<span class="pbadge" title="${need} need you">${need}</span>`:'')
      + `<span class="pclose" title="Close (stop members, keep the team)" onclick="event.stopPropagation();closeTab('${esc(o)}')">✕</span></div>`
  }
  el.innerHTML = orgs.map(tab).join('') + `<div class="ptab add" title="New project (Build)" onclick="newProject()">＋</div>`
  const act = el.querySelector('.ptab.active')
  if (act && act.scrollIntoView) { try { act.scrollIntoView({ inline:'nearest', block:'nearest' }) } catch {} }
  requestAnimationFrame(updateTabHints)   // #2a E: after layout, surface off-screen needs-you counts
}
// #2a E: sum the ❓ needs-you on tabs scrolled fully out of the strip, on each side, into a clickable
// "‹N" / "N›" edge hint — so a needy project is never silently hidden off-screen. Keyboard-operable
// (the hints are <button>s). Recomputed after render, on strip scroll, and on resize.
function updateTabHints() {
  const el = $('#tabs'), L = $('#tabHintL'), R = $('#tabHintR'); if (!el || !L || !R) return
  let needL = 0, needR = 0
  for (const t of el.querySelectorAll('.ptab')) {
    const badge = t.querySelector('.pbadge'); if (!badge) continue
    const n = parseInt(badge.textContent, 10) || 0; if (!n) continue
    const left = t.offsetLeft - el.scrollLeft, right = left + t.offsetWidth
    if (right < 24) needL += n                       // fully off the left edge
    else if (left > el.clientWidth - 24) needR += n  // fully off the right edge
  }
  L.hidden = !needL; R.hidden = !needR
  if (needL) L.textContent = '‹' + needL
  if (needR) R.textContent = needR + '›'
}
window.scrollTabs = (dir) => { const el = $('#tabs'); if (!el) return; el.scrollBy({ left: dir * Math.max(120, el.clientWidth * 0.7), behavior: 'smooth' }); setTimeout(updateTabHints, 360) }

function memberState(m) {

  if (ib.dismissed.length) {

  if (S.org && teams.length && !orgRunning(S.org)) {

    html += `<div class="resume"><h3>⏸ "${esc(S.org)}" is stopped</h3>`

      + `<div class="step">First run rebuilds the image (~minutes). Each live member must re-accept its one-time <b>Channels prompt in its Console</b> before it's active${live.length?`: ${live.map(m=>'@'+esc(m.first)).join(', ')}`:''}. Workers are on-demand (no accept).</div>`

function renderMember(d) {

// Live member -> its OWN embedded ttyd. #40: the live terminal lives in the PERSISTENT #termhost overlay
// (managed by syncTermHost) so switching members never remounts the iframe (no blank/reconnect). Here we
// only render the #detail fallback when there's no live ttyd yet; when there IS one, #detail is emptied
// and syncTermHost shows the keep-alive iframe over it.
function renderTerminal(d, m) {
  // #41: render the daemon's per-member terminal `state` as a PURE pass-through (no client recompute — the
  // daemon's classifyTerminal is the one source of truth). serve → the keep-alive overlay shows it (here we
  // just clear #detail); the other 4 states get honest copy. orphaned is reassurance-FIRST + a per-member
  // Relaunch.
  const L = launchFor()
  const state = L && L.members && L.members[m.handle] && L.members[m.handle].state
  if (state === 'serve') { d.innerHTML = ''; return }   // the persistent overlay shows the live terminal
  const removeBtn = `<div class="row" style="justify-content:flex-end;margin-bottom:8px"><button class="btn tiny" onclick="removeMember('${esc(m.handle)}','${esc(m.first)}')">✕ remove @${esc(m.first)}</button></div>`
  let body
  if (state === 'orphaned') {
    body = `<div class="empty"><b>@${esc(m.first)} is still running</b> — its agent is alive and working in the room; only the terminal <i>view</i> was lost (its host-side plumbing died). Relaunch to restore the terminal — the conversation resumes where it left off (an in-flight turn may restart).
      <div style="margin-top:12px"><button class="btn primary" onclick="relaunchMember('${esc(m.handle)}','${esc(m.first)}')">↻ Relaunch terminal</button></div></div>`
  } else if (state === 'building') {
    body = `<div class="empty">Building @${esc(m.first)}'s image — first run takes a few minutes. The terminal appears here once it's up.</div>`
  } else if (state === 'starting') {
    body = `<div class="empty">@${esc(m.first)} is starting — its terminal appears here in a moment.</div>`
  } else {   // dead / no live launch
    body = `<div class="empty">@${esc(m.first)} isn't launched. Build + <b>🚀 Launch</b> the team (or <code>mrc team up</code>).</div>`
  }
  d.innerHTML = removeBtn + body
}
// #40 keep-alive terminal overlay. Called every paint: shows the selected live member's iframe (lazily
// created once, src never changed), hides all others + on any non-terminal view, and tears down iframes
// for members no longer launched (stop/remove/suspend/cross-org). Keyed by org|handle so org-A's
// terminal never shows under org-B.
function termHeaderHTML(m, url) {
  const live = orgMembers().filter(x=>x.tier==='live'); const ready=live.filter(x=>x.online).length; const starting=live.filter(x=>!x.online && x.launched).length
  return `<b>@${esc(m.first)} <span class="muted">· terminal</span></b>
    <span class="muted">${ready}/${live.length} ready${starting?` · <span class="warn">${starting} starting</span>`:''} <a href="${esc(url)}" target="_blank" style="margin-left:8px">open ↗</a> <button class="btn tiny" style="margin-left:8px" onclick="removeMember('${esc(m.handle)}','${esc(m.first)}')">✕ remove</button> <button class="btn tiny danger" onclick="stopTeam()">■ Stop team</button>`
}
function syncTermHost() {
  const host = $('#termhost'), detail = $('#detail')
  if (!host || !detail) return
  // the active terminal target: a selected LIVE member with a live ttyd in the CURRENT org
  let target = null
  if (!S.building && S.selMember) {
    const m = memberByHandle(S.selMember), L = launchFor()
    const info = m && m.tier!=='worker' && L && L.members && L.members[m.handle]
    // #41: only embed the iframe when the daemon says state==='serve' — never for orphaned (its ttydPort is
    // stale → a blank iframe = silent-broken). #detail shows the orphaned/Relaunch copy instead.
    if (info && info.state === 'serve' && info.ttydUrl) target = { key: S.org+'|'+m.handle, url: info.ttydUrl, m }
  }
  // teardown: any block whose member is no longer SERVING (stopped/removed/suspended/org gone, OR it just
  // transitioned serve→orphaned) — removes the iframe → closes its ws, no stale blank embed.
  const liveKeys = new Set()
  for (const l of (S.teams.launch||[])) if (l.running && l.members) for (const h of Object.keys(l.members)) if (l.members[h] && l.members[h].state === 'serve') liveKeys.add(l.org+'|'+h)
  for (const b of [...host.children]) if (!liveKeys.has(b.dataset.key)) b.remove()   // removes the iframe → closes its ws
  if (!target) { host.style.display='none'; detail.style.display=''; return }
  let block = [...host.children].find(b => b.dataset.key===target.key)
  if (!block) {
    block = document.createElement('div'); block.className='termblock'; block.dataset.key=target.key
    block.innerHTML = `<div class="termhdr"></div><iframe class="termframe" title="@${esc(target.m.first)} terminal" src="${esc(target.url)}"></iframe><div class="termfoot muted">First launch: log in + accept the Channels prompt in this terminal.</div>`
    host.appendChild(block)   // lazily created once; src is never changed after this
  }
  block.querySelector('.termhdr').innerHTML = termHeaderHTML(target.m, target.url)   // header patch is cheap; iframe sibling untouched
  // Reload the iframe ONLY when the member's ttyd URL actually changed (its viewer respawned on a new
  // port) — a member-switch keeps the same URL, so this is a no-op then (keep-alive preserved).

// Stick-to-bottom ONLY when the user is already near the bottom (chat/log pattern). If they've scrolled
// UP to read history, a 1.5s live update must NOT yank their viewport — to the bottom OR to the top.
// We capture before the mutation and follow-or-restore after (restore is a no-op when textContent is
// mutated in place, and corrects an innerHTML-style reset — so it's safe either way).
function followScroll(el, mutate) {
  const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 40
  const keepTop = el.scrollTop
  mutate()
  el.scrollTop = atBottom ? el.scrollHeight : keepTop
}

// Render the STRUCTURED transcript (#18). Each record is one logical message {t: line text, q: question
// id|null, r: reply-to id|null}. The jump anchor (id="q<N>"), the `[#N]` chip, and the `re #N` jump link
// derive ONLY from the daemon-authored q/r fields — never from scanning the line text. So a member's
// `[#7]`/`(re #7)` in their own message (even a `\n`-injected fake line) is just esc()'d display text:
// it cannot create an anchor, forge a jump link, or hijack a real question's #N. Spoof-proof by construction.
function transcriptHTML(records) {
  return (records||[]).map(rec => {
    const t = String(rec.t||'')
    if (rec.q != null) {
      // The daemon's own ` [#q]` suffix is re-rendered as a styled chip from the trusted field; strip
      // only that exact trailing token (a member's earlier `[#x]` mid-text stays as inert escaped text).
      const body = esc(t.replace(/\s*\[#\d+\]\s*$/, ''))
      return `<div class="tline" id="q${rec.q}">${body} <span class="qnum">[#${rec.q}]</span></div>`
    }
    if (rec.r != null) {
      const body = esc(t.replace(/\s*\(re #\d+\)\s*$/, ''))
      return `<div class="tline">${body} <a class="qjump" onclick="jumpToQ(${rec.r})" title="jump to question #${rec.r}">re #${rec.r}</a></div>`
    }
    return `<div class="tline">${esc(t)||' '}</div>`
  }).join('')
}
// Old room with only thread.log (no structured records yet) → render lines inert (no anchors). Safe:
// we never re-derive trust from text. Used only as a fallback when the transcript is empty.
const inertThreadHTML = (raw) => String(raw||'').split('\n').map(l => `<div class="tline">${esc(l)||' '}</div>`).join('')
const threadBodyHTML = (room) => { const tx=(room&&room.transcript)||[]; const raw=(room&&room.thread)||''; return tx.length ? transcriptHTML(tx) : (raw ? inertThreadHTML(raw) : '(no messages yet)') }
window.jumpToQ = (id)=>{ const el=$('#q'+id); if(!el)return; el.scrollIntoView({block:'center',behavior:'smooth'}); el.classList.add('qhi'); setTimeout(()=>el.classList.remove('qhi'),1400) }
function renderTab() {
  const b = $('#tabbody'); if (!b) return
  if (S.tab==='thread') { const raw=(S.room&&S.room.thread)||''; b.innerHTML = `<div class="thread" id="thread" tabindex="0">${threadBodyHTML(S.room)}</div>`; const t=$('#thread'); if(t){ t.dataset.raw=raw; t.scrollTop=t.scrollHeight } }
  else if (S.tab==='summary') b.innerHTML = `<pre class="thread" id="summary" tabindex="0">${esc((S.room&&S.room.consensus)||'(no summary)')}</pre>`   // #2a E: focusable → arrow-scroll
  else {
    const cu = (S.room&&S.room.catchups)||[]
    b.innerHTML = cu.length ? [...cu].reverse().map(c=>`<div class="pane ${(c.status==='ready'&&!c.reviewedAt)?'unrev':''}">
      <div class="row" style="justify-content:space-between"><b>Catch-up #${c.seq}</b> <span class="muted">${esc(c.pauseReason||'')} · ${c.status}${c.reviewedAt?' · reviewed':''}</span></div>
      ${Object.values(c.handoffs||{}).map(h=>`<div class="card"><b>${esc(h.name||'')}</b>\n${esc(h.text||'')}</div>`).join('')||'<div class="muted">waiting for handoffs…</div>'}
      ${(c.status==='ready'&&!c.reviewedAt)?`<button class="btn tiny" onclick="reviewCu(${c.seq})">Mark reviewed</button>`:''}</div>`).join('')
      : `<div class="muted">No catch-ups. (Auto handoffs fire when a room pauses; mainly used by 2-party consults today.)</div>`
  }
}
function renderInboxItem(d) {
  const q = (S.teams.userInbox||[]).find(x=>x.id===S.selInbox)   // stable id, not array index
  if (!q) { d.innerHTML = `<div class="empty">Message gone.</div>`; return }
  const isQ = q.type==='question'
  const head = isQ ? '❓ A member needs you' : '🔔 Notification'
  // #24: when an item was resolved on ANOTHER surface (answered via Telegram), say so — the reply box
  // here just closed under the user, and a silent vanish would read as a bug. Show how it resolved.
  const viaTg = q.answeredVia === 'telegram'
  // #35: a turn-cap item RESUMED (not "answered"); show its real resolution + any steered note.
  const steered = q.pauseRoom && q.answer && q.answer !== '(resumed)'
  const done = q.answered ? (q.pauseRoom
      ? `<div class="good" style="font-size:12px">✓ Resumed${viaTg?' via Telegram':''}</div>${steered?`<div class="muted">↳ steered: ${esc(q.answer)}</div>`:''}`
      : `<div class="good" style="font-size:12px">✓ Answered${viaTg?' via Telegram':''}</div><div class="muted">↳ ${esc(q.answer||'')}</div>`)
    : q.dismissed ? `<div class="muted">↳ dismissed — re-open to act on it</div>` : ''
  // EVERY open item is replyable (#15) — a reply routes a [Human reply] via answerUser (open-revalidation
  // stale-guards a double-answer). A notification differs only in framing ("reply optional", it never
  // badges) — not in capability. Dismiss clears without replying (instant on a notification, confirmed
  // on a question — handled in dismissInbox). Dismissed → ↺ Re-open. All keep "Open room".
  const actions = q.answered ? `<div style="margin-top:8px"><button class="btn" onclick="openRoom('${esc(q.roomId)}')">Open room</button></div>`
    : q.dismissed ? `<div class="row" style="margin-top:8px"><button class="btn primary" onclick="reopenInbox(${S.selInbox})">↺ Re-open</button> <button class="btn" onclick="openRoom('${esc(q.roomId)}')">Open room</button></div>`
    : `${isQ ? '' : '<div class="muted" style="margin:6px 0">FYI — reply optional.</div>'}<textarea id="ansTx" placeholder="Your reply (routes back as [Human reply])…"></textarea><div class="row" style="margin-top:8px"><button class="btn primary" onclick="answer(${S.selInbox})">Send reply</button> <button class="btn" onclick="dismissInbox(${S.selInbox})">✕ Dismiss</button> <button class="btn" onclick="openRoom('${esc(q.roomId)}')">Open room</button></div>`
  d.innerHTML = `<h2>${head}</h2>
    <div class="pane ${isQ?'':'fyi'}"><div class="who muted"><b style="color:var(--fg)">${esc(q.fromName||('@'+q.from))}</b> in <b>${esc(q.room)}</b></div>
    <div style="margin:8px 0;white-space:pre-wrap">${esc(q.text)}</div>
    ${done}${actions}</div>`
}

window.bSavePersona=async()=>{ const f=S.builder._pEdit; if(!f)return; const key=String(f.key||'').trim()
  const setMsg=(h)=>{ const m=$('#bPMsg'); if(m)m.innerHTML=h }
  if(!key){ setMsg('<span class="bad">key required</span>'); return }
  if(!String(f.mandate||'').trim()){ setMsg('<span class="bad">charter (mandate) required — it defines the role</span>'); return }
  const persona={ label:(f.label||'').trim()||key, mandate:f.mandate||'', mount:f.mount==='rw'?'rw':'ro', leadByDefault:!!f.leadByDefault }
  setMsg('<span class="muted">saving…</span>')
  const r=await api('/api/personas',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({org:S.builder.org,op:'save',key,persona})}).catch(()=>({ok:false,error:'network error'}))
  const localOnly = !r.ok && /unknown org/.test(r.error||'')   // new project not yet on disk — stage locally, team-save persists
  if(r.ok || localOnly){ S.builder.personas=S.builder.personas||{}; S.builder.personas[key]=persona; S.builder._pEdit=null
    bRenderPersonas(); bRenderTeams(); bPreview(); setMsg(r.ok?`<span class="good">✓ saved @${esc(key)} to project</span>`:`<span class="muted">added @${esc(key)} — 💾 Save team.json to persist</span>`) }
  else setMsg(`<span class="bad">✗ ${esc(r.error)}</span>`)   // parse/reference rejection → keep the form open to fix
}
window.bRemovePersona=async(k)=>{ const setMsg=(h)=>{ const m=$('#bPMsg'); if(m)m.innerHTML=h }
  const used=membersUsingPersona(k); if(used.length){ setMsg(`<span class="bad">@${esc(k)} is used by ${esc(used.join(', '))} — reassign first</span>`); return }
  // Removing deletes the role from the project's team.json (when on disk) — confirm, matching the other
  // disk-mutating actions (stopTeam/deleteProject). Recoverable by re-creating, so a plain confirm is enough.
  if(!confirm(`Remove custom role @${k}? It will be deleted from this project's team.json. You can re-create it later.`))return
  const r=await api('/api/personas',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({org:S.builder.org,op:'remove',key:k})}).catch(()=>({ok:false,error:'network error'}))
  const localOnly = !r.ok && /unknown org/.test(r.error||'')
  if(r.ok || localOnly){ delete S.builder.personas[k]; if(S.builder._pEdit&&S.builder._pEdit.key===k)S.builder._pEdit=null; bRenderPersonas(); bRenderTeams(); bPreview(); setMsg(`<span class="muted">removed @${esc(k)}</span>`) }

}

// Render the Settings modal — centered card + scrim over the whole app. EVENT-DRIVEN (openSettings /
// closeSettings / the tg handlers / enableNotifyPerm) — deliberately NOT called from paint()/tick(), so
// it never runs on the 1.5s poll. The `_modalShown` transition-guard makes repeated calls safe regardless:
// build the shell + focus the card ONLY on the open transition; clear + return focus to the gear ONLY on
// the close transition; an already-open call patches JUST the live Telegram bits (never rebuilds the inputs,
// never touches focus). (An earlier version was wired into paint() and stole focus every tick — fixed.)
let _modalShown = false, _modalSig = null
function renderModal() {
  const host = $('#modal'); if (!host) return
  const gear = $('#gearBtn')
  if (!S.settingsOpen) {
    if (_modalShown) {   // CLOSE transition only — never focus the gear on an unchanged-closed tick
      host.innerHTML=''; _modalShown=false; _modalSig=null
      if (gear) gear.setAttribute('aria-expanded','false')
      try { gear && gear.focus() } catch {}
    }
    return
  }
  if (!_modalShown) {   // OPEN transition — build the shell once, focus the CARD (not the ✕ → no hair-trigger Enter-close), trap Tab
    _modalShown=true; _modalSig=null
    if (gear) gear.setAttribute('aria-expanded','true')
    host.innerHTML = `<div class="scrim" onclick="if(event.target===this)closeSettings()">
      <div class="modalcard" role="dialog" aria-modal="true" aria-label="Settings" tabindex="-1">
        <div class="modalhead"><h2 style="margin:0;font-size:14px">⚙ Settings</h2><button class="btn tiny" aria-label="Close settings" onclick="closeSettings()">✕</button></div>
        <div class="modalbody" id="modalBody"></div>
      </div></div>`
    const card = host.querySelector('.modalcard')
    if (card) {
      try { card.focus() } catch {}
      card.addEventListener('keydown', (e)=>{
        if (e.key==='Escape') { e.preventDefault(); closeSettings(); return }
        if (e.key!=='Tab') return
        const f = [...card.querySelectorAll('button,a[href],input,select,textarea,[tabindex]:not([tabindex="-1"])')].filter(el=>!el.disabled && el.offsetParent!==null)
        if (!f.length) return
        const a=f[0], b=f[f.length-1]
        if (e.shiftKey && document.activeElement===a) { e.preventDefault(); b.focus() }
        else if (!e.shiftKey && document.activeElement===b) { e.preventDefault(); a.focus() }
      })
    }
  }
  // Body: full rebuild only when the content SIGNATURE changes (open / loading→content / forced via
  // _modalSig=null); otherwise patch ONLY the live Telegram section — no input rebuild, no focus touch.
  const body = $('#modalBody'); if (!body) return
  const sig = (S.settings ? (S.settings._failed?'failed':'ok') : 'loading') + ':' + (S.org||'')
  if (sig !== _modalSig) { body.innerHTML = settingsBody(); _modalSig = sig }
  else {
    const tgEl = $('#tgSection')
    if (tgEl) {
      tgEl.innerHTML = tgSectionHtml()
      // A tg action (Confirm/Reject/unpair) replaced the very button that had focus → focus falls to
      // <body>, OUTSIDE .modalcard, which silently breaks Esc + the Tab-trap (both bound to the card).
      // Pull focus back into the modal: the new actionable element (the unpair link / next Confirm), else the card.
      const card = host.querySelector('.modalcard')
      if (card && !card.contains(document.activeElement)) { try { (tgEl.querySelector('a[href],button') || card).focus() } catch {} }
    }
  }
}

// Per-project Telegram pairing (#12), inside the modal. Trust-gate markup (Confirm/Reject a pending chat,
// the linked line + Unpair); every Telegram-supplied field is esc()'d (an unauthorized /start lands an
// attacker-controlled name here). Handlers (tgConfirm/Reject/Unpair) are CSRF-guarded via actJSON→/api/tg.
function tgSectionHtml() {
  const tg = (S.teams.telegram||{})[S.org]
  if (tg && tg.warning) return `<div class="bad" style="font-size:12px;margin-top:5px">⚠ ${esc(tg.warning)}</div>`
  if (!tg || !tg.configured) return `<div class="shelp">DM the project's bot <code>/start</code>, then Confirm here. Enable it by setting <code>MRC_TELEGRAM_BOT_TOKEN</code> in the repo's <code>.env</code>.</div>`
  const tgName = (x) => x.username ? `@${esc(x.username)}`
    : ([x.firstName, x.lastName].filter(Boolean).join(' ') ? esc([x.firstName, x.lastName].filter(Boolean).join(' '))
    : `chat ${esc(x.chatId || x.fromId)}`)
  if (tg.pending && tg.pending.length) {
    return `<div class="shelp" style="margin-top:5px">📱 Confirm to link a chat to <b>${esc(S.org)}</b> — confirm only YOUR account; an unexpected entry is someone else who messaged the bot — Reject it.</div>`
      + tg.pending.map(p=>{
          const realName = [p.firstName, p.lastName].filter(Boolean).join(' ')
          const detail = (p.username || realName) ? ` <span class="muted">(${[p.username && realName, `id ${esc(p.fromId)}`].filter(Boolean).join(', ')})</span>` : ''
          return `<div style="margin:6px 0"><div style="margin-bottom:5px"><b>${tgName(p)}</b>${detail} <span class="muted">→ link to</span> <b>${esc(S.org)}</b></div><div class="row" style="gap:6px"><button class="btn tiny primary" onclick="tgConfirm('${esc(p.fromId)}')">Confirm</button> <button class="btn tiny" onclick="tgReject('${esc(p.fromId)}')">Reject</button></div></div>`
        }).join('')
  }
  if (tg.pinned) {
    const p = tg.pinned
    const envChip = p.prePinned ? ` <span title="pinned via this repo's .env (MRC_TELEGRAM_CHAT_ID)" style="opacity:.7;font-size:10px;border:1px solid var(--line);border-radius:4px;padding:1px 4px">.env</span>` : ''
    return `<div style="display:flex;align-items:center;gap:6px;font-size:12px;margin-top:5px"><span aria-hidden="true">📱</span><span class="muted">linked to</span><b style="font-weight:600">${tgName(p)}</b>${envChip}<a href="#" style="margin-left:auto;color:var(--link)" onclick="tgUnpair();return false">unpair</a></div>`
      + (tg.lastPushError ? `<div class="bad" style="font-size:11px;margin-top:4px">⚠ last push failed: ${esc(tg.lastPushError)} — re-link if the chat is stale.</div>` : '')
  }
  return `<div class="shelp" style="margin-top:5px">📱 DM the bot <code>/start</code>, then Confirm here.</div>`
}

  const r = await act('dismiss',{i:id}); if(!r.ok)return flashFail(r)   // keep it if the dismiss didn't land (#20)
  S.flash=null; if(S.selInbox===id)S.selInbox=null; tick()
}
window.reopenInbox = async (i)=>{ const r=await act('reopen',{i}); if(!r.ok)return flashFail(r); S.flash=null; tick() }   // undo a dismiss → actionable again
// Telegram pairing (#12): Confirm is the trust gate (on the localhost dashboard); Reject/Unpair too.
// #46: these now live in the Settings modal, which is OFF the poll — so after the action, refresh the
// data (await tick → fresh S.teams.telegram) and explicitly re-render the modal's live Telegram bits.
window.tgConfirm = async (fromId)=>{ const r=await actJSON('/api/tg',{action:'tgconfirm',org:S.org,fromId:Number(fromId)}); if(!r.ok)return flashFail(r); S.flash=null; await tick(); if(S.settingsOpen)renderModal() }
window.tgReject = async (fromId)=>{ const r=await actJSON('/api/tg',{action:'tgreject',org:S.org,fromId:Number(fromId)}); if(!r.ok)return flashFail(r); S.flash=null; await tick(); if(S.settingsOpen)renderModal() }
window.tgUnpair = async ()=>{ if(!confirm('Unpair Telegram? The linked chat stops receiving questions until you re-link.'))return; const r=await actJSON('/api/tg',{action:'tgunpair',org:S.org}); if(!r.ok)return flashFail(r); S.flash=null; await tick(); if(S.settingsOpen)renderModal() }
// Delete project (#13): forget it from the daemon + stop sessions; nothing on disk is deleted.
window.deleteProject = async ()=>{ const org=S.org; if(!org||!confirm(`Delete "${org}" from Mister Claude? Its sessions stop and the tab is removed. Nothing on disk is deleted — your transcripts and team.json stay, so you can re-add it any time with \`mrc team up\`.`))return; const r=await actJSON('/api/team-delete',{org}); if(!r.ok)return flashFail(r); S.flash=null; S.org=null; S.selRoom=S.selInbox=S.selMember=null; S.building=false; closeSettings(); tick() }
window.toggleDismissed = ()=>{ S.showDismissed=!S.showDismissed; paint() }

// Dedup: a set of seen @you item keys. SEEDED on first load (notifyNewInbox below) so the existing
// backlog never fires — only items arriving AFTER the dashboard opens notify. Keyed by org+id so an
// item in any org dedups once (no cross-org double-fire).
const _seenInbox = new Set(); let _inboxSeeded = false
const inboxKey = (q)=> (q.org||'')+'#'+q.id
function notifyNewInbox(items) {
  const open = (items||[]).filter(q => !q.answered && !q.dismissed)   // open @you items, ALL orgs
  if (!_inboxSeeded) { open.forEach(q => _seenInbox.add(inboxKey(q))); _inboxSeeded = true; return }
  let fresh = open.filter(q => !_seenInbox.has(inboxKey(q)))
  fresh.forEach(q => _seenInbox.add(inboxKey(q)))
  if (!fresh.length || !S.notifyEnabled) return
  if (!('Notification' in window) || Notification.permission !== 'granted') return
  // Server-persisted prefs (#42c) decide WHICH events notify (question vs FYI) + whether the chime sounds.
  const pr = S.notifyPrefs || { chime:true, questions:true, fyis:true }
  fresh = fresh.filter(q => q.type==='question' ? pr.questions!==false : pr.fyis!==false)
  if (!fresh.length) return
  fresh.forEach(fireNotification)
  if (pr.chime!==false && fresh.some(q => q.type==='question')) playChime()   // chime only for needs-you questions; FYIs notify silently (push≠nag in the OS layer)
}
function fireNotification(q) {
  const isQ = q.type==='question'
  const who = q.fromName || ('@'+(q.from||'a teammate'))
  const org = q.org ? ' · '+q.org : ''
  // question = needs-you (sticky until dismissed); FYI = reply-optional push (transient, no OS nag),
  // mirroring the inbox's badge-questions-only philosophy. The body is member-authored (untrusted) —
  // the Notification API renders the `body` option as PLAIN TEXT (no HTML parse), so it's inert.
  try {
    const n = new Notification((isQ ? '❓ '+who+' needs you' : '🔔 '+who)+org, {
      body: (q.text||'').slice(0,180),
      tag: 'mrc-'+inboxKey(q),
      requireInteraction: isQ,
    })
    n.onclick = ()=>{ try { window.focus() } catch {} ; if (q.org) switchOrg(q.org); selInbox(q.id); n.close() }
  } catch {}
}
function updateNotifyBtn() {
  const b = $('#notifyBtn'); if (!b) return
  const perm = ('Notification' in window) ? Notification.permission : 'denied'
  if (perm === 'denied') { b.className='pill notif blocked'; b.textContent='🔕 blocked'; b.setAttribute('aria-pressed','false'); b.title='Notifications blocked — enable them in your browser’s site settings'; return }
  if (S.notifyEnabled && perm === 'granted') { b.className='pill notif on'; b.textContent='🔔 alerts'; b.setAttribute('aria-pressed','true'); b.title='New-@you notifications + chime ON — click to mute' }
  else { b.className='pill notif'; b.textContent='🔕 alerts'; b.setAttribute('aria-pressed','false'); b.title='Click to enable browser notifications + chime for new @you messages' }
}
window.toggleNotify = async ()=>{
  if (!('Notification' in window)) { S.flash={kind:'note',text:'This browser does not support notifications.'}; renderFlash(); return }
  if (S.notifyEnabled) { S.notifyEnabled=false; try{ localStorage.removeItem('mrc-notify') }catch{}; updateNotifyBtn(); return }
  // turning ON — request permission here (gesture-gated: this runs from the 🔔 click, never on load)
  let perm = Notification.permission
  if (perm === 'default') { try { perm = await Notification.requestPermission() } catch { perm='denied' } }
  if (perm !== 'granted') {   // blocked/denied — do NOT silently show as on-but-dead (Florent's 3-state)
    S.notifyEnabled=false; try{ localStorage.removeItem('mrc-notify') }catch{}
    S.flash={kind:'note',text:'Notifications are blocked for this page — enable them in your browser’s site settings, then click 🔔 again.'}; renderFlash(); updateNotifyBtn(); return
  }
  S.notifyEnabled=true; try{ localStorage.setItem('mrc-notify','1') }catch{}
  updateNotifyBtn(); playChime()   // audible confirmation + satisfies the autoplay-needs-gesture rule
}
window.stopTeam = async ()=>{ if(!confirm('Stop the team? This closes all member terminals.'))return; const r=await actJSON('/api/team-stop',{org:S.org}); if(!r.ok)return flashFail(r); S.flash=null; tick() }
window.removeMember = async (h, first)=>{ if(!confirm('Remove @'+first+' from the team? (updates team.json)'))return; const r=await actJSON('/api/team-remove-member',{org:S.org,handle:h}); if(!r.ok)return flashFail(r); S.flash=null; S.selMember=null; tick() }
// #41: recover an orphaned terminal — stops the lost session (master+container) FIRST, then a fresh spawn.
// The agent's conversation resumes (--continue). Goes through actJSON → CSRF-guarded + confirms a 2xx
// before clearing (no optimistic success; a 403/error surfaces via flashFail).
window.relaunchMember = async (h, first)=>{ if(!confirm(`Relaunch @${first}'s terminal? Its agent keeps running — this restores the terminal view (the conversation resumes; an in-flight turn may restart).`))return; const r=await actJSON('/api/team-relaunch-member',{org:S.org,handle:h}); if(!r.ok)return flashFail(r); S.flash=null; tick() }
window.bLaunch = async ()=>{ const msg=$('#bMsg'); if(!msg)return; msg.innerHTML='<span class="muted">launching… first run builds the image (~minutes)</span>'
  const r=await postJSON('/api/team-launch',{roster:bRoster()})
  if(r&&r.ok){ msg.innerHTML='<span class="good">🚀 launching — pick each member to open its terminal and log in</span>'; S.org=bRoster().org||null; setOrgUrl(S.org); setTimeout(()=>{S.building=false;tick()},700) }
  else msg.innerHTML=`<span class="bad">✗ ${esc((r&&r.error)||'failed')}</span>` }

// Scoped launch (mrc gui [repo]): pre-fill the builder from ?repo=&org=, then land on Build (or Teams
// if a team for that org already exists — decided after the first data load).
const _q = new URLSearchParams(location.search)
const _qRepo = _q.get('repo')
const _proj = decodeURIComponent(location.pathname.replace(/^\/+/, '').split('/')[0] || '')   // /anigame -> anigame
if (_proj) { S.org = _proj; S.builder.org = _proj }       // path is the project -> jump straight to it
if (_qRepo) { S.builder.repo = _qRepo }
let _scopedNav = !!_qRepo
tick(); setInterval(tick, 1500)
$('#tabs')?.addEventListener('scroll', updateTabHints, { passive: true })   // #2a E: keep the off-screen hints live
addEventListener('resize', updateTabHints)
</script>
