<title>Mister Claude</title>
<style>
  /* #2a — ONE source of truth. Tokens are named by MEANING, not appearance: several are the same hue
     today but kept SEPARATE so Côme's 2b palette can diverge any one without re-blurring a distinction
     (per Sandrine's semantic contract + Roland's no-op gate — every value here equals today's). */
  :root {
    /* surfaces */
    --bg:#0f1115; --panel:#171a21; --panel2:#1d212b; --line:#262b36; --inset:#0b0d12; --field:#11141b;
    /* text */
    --fg:#e6e9ef; --dim:#8b93a3;
    /* #2b — Mr. Claude palette (derived from Côme's swatches by INTENT, WCAG-AA on the dark base).
       Two learnable hue families: PURPLE = brand / attention (the top-hat), BLUE = navigate / info. */
    --accent:#a78bfa;   /* brand / active selection — the top-hat purple */
    --link:#6aa0f5;     /* hyperlinks (navigate) */
    --info:#5b9cf6;     /* 🔗 Telegram-pending / informational (blue — NOT the purple needs-you) */
    --worker:#6aa0f5;   /* worker (on-demand) state */
    /* status — perceptually distinct AND semantically mapped (green≈good, amber≈attention, red≈bad) */
    --online:#5ec878;   /* ready / running / online */
    --starting:#e6a23c; /* starting / attention */
    --warning:#e6a23c;  /* warning / paused */
    --danger:#f2607a;   /* offline / error / destructive */
    /* needs-you family — purple (brand-attention); three DISTINCT meanings */
    --needs-you:#c4a6ff; /* ❓ needs-you / @you — the brightest "ping" */
    --lead:#b39ddb;      /* lead member */
    --ref:#b8a4f0;       /* [#N] reference chip */
    /* A11Y GUARDRAIL (Sandrine's contract pt 3): purple↔blue compresses under red-green colorblindness,
       so 🔗-info(blue) vs ❓-needs-you(purple), and the three close purples (needs-you/lead/ref), are NOT
       reliably separable by COLOR alone — the GLYPH/context channel (🔗 ❓ ● ✓ ✕, position) is load-bearing.
       Never drop those glyphs for a "cleaner" color-only treatment in a polish pass. */
    /* legacy aliases so existing .good/.warn/.bad/.state/pills keep their exact look */
    --good:var(--online); --warn:var(--warning); --bad:var(--danger);
    /* semantic surfaces (bg / border / fg) for buttons, badges, flashes — unifies the ad-hoc accents */
    --info-bg:#23314d; --info-border:#33507e; --info-fg:#cfe0ff;
    --danger-bg:#2a1b21; --danger-border:#5a3540; --danger-fg:#f4a6b4;
    --success-bg:#1f3a26; --success-border:#2f6b3f; --success-fg:#bfe6c8;
    --needs-bg:#3a2f4f; --needs-fg:#d7c5f5;          /* soft needs-you badge */
    --needs-edge:#5a4a7a; --needs-edge-fg:#e7dcff;   /* brighter needs-you: tab badge + needs-you panel borders */
    --unread:#f56565;    /* #63-F unread divider — a RED read-position marker, deliberately distinct from the PURPLE needs-you action accent (two cues, not one) */
    /* rhythm (8px scale) + radius — defined now for 2b; adopted value-preserving where it matches */
    --sp1:4px; --sp2:8px; --sp3:12px; --sp4:16px; --sp5:24px; --sp6:32px;
    --radius:10px; --radius-sm:7px; --radius-pill:999px;
  }
  * { box-sizing:border-box }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; height:100vh; overflow:hidden }
  code,pre,.mono { font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace }
  a { color:var(--link); text-decoration:none }
  .tgunpair:hover { text-decoration:underline }   /* subtle at rest (dim, no underline), discoverable on hover for a state-changing action */
  /* layout */
  .app { display:grid; grid-template-rows:50px 1fr; height:100vh }
  header { display:flex; align-items:center; gap:12px; padding:0 16px; border-bottom:1px solid var(--line); background:var(--panel) }
  /* Title in Silkscreen (pixel) recolored to brand purple — @user's wordmark option-2. Pixel fonts
     read larger/wider than mono, so a slightly smaller size + tighter line. Falls back to mono offline. */
  header h1 { font-family:'Silkscreen', ui-monospace, SFMono-Regular, monospace; font-size:13px; margin:0; font-weight:400; letter-spacing:.3px; color:var(--accent); display:flex; align-items:center; gap:8px }
  .hatmark { fill:var(--accent); flex:0 0 auto; filter:drop-shadow(0 1px 2px rgba(0,0,0,.4)) }   /* the Mr. Claude top-hat (favicon, brand purple) */
  /* 🔔 notification toggle — 3-state (off / on / blocked); on = brand accent, blocked = warning */
  button.pill { background:transparent; cursor:pointer; font-family:inherit; line-height:1.6 }
  .pill.notif.on { color:var(--accent); border-color:var(--accent) }
  .pill.notif.blocked { color:var(--warning); border-color:#4a3a22 }
  header .spacer { flex:1 }
  .main { display:grid; grid-template-columns:340px 1fr; min-height:0 }
  .list { border-right:1px solid var(--line); overflow:auto; padding:10px }
  .detail { display:flex; flex-direction:column; overflow:auto; padding:16px 20px; min-width:0; min-height:0 }
  /* #40: persistent terminal host — overlays the detail cell (col 2) so member iframes survive a
     re-render / member-switch (no remount = no blank/reconnect). One keep-alive iframe per org+handle. */
  #termhost { grid-column:2; grid-row:1; display:none; flex-direction:column; overflow:hidden; padding:16px 20px; min-width:0; min-height:0; background:var(--bg) }
  /* #62 new-project full-view takeover: a FRESH build (not Edit-teams) fills the width — hide the contextual
     list + collapse the grid to one column, and hide the project tabs (visibility:hidden keeps the header's
     flex:1 spacer so the alerts/daemon/gear pills stay right-aligned). The app header itself stays. Editing an
     existing team carries no .build-takeover class → it remains the in-place subpanel. ✕ Cancel clears
     S.building → paint() drops the class → the layout restores. */
  .app.build-takeover .main { grid-template-columns:1fr }
  .app.build-takeover .list { display:none }
  /* #detail is pinned to grid-column:2 by an ID rule (below) — match that ID specificity to span it full-width,
     else the hidden list's column 1 leaves an empty gutter beside the builder. */
  .app.build-takeover #detail { grid-column:1 / -1 }
  .app.build-takeover .tabwrap { visibility:hidden }
  /* P2 command-center: the Projects landing is a full-width takeover (same mechanism as the builder) — a
     glanceable grid of every project that doubles as the pick/resume picker. */
  .app.projects-takeover .main { grid-template-columns:1fr }
  .app.projects-takeover .list { display:none }
  .app.projects-takeover #detail { grid-column:1 / -1 }
  .app.projects-takeover .tabwrap { visibility:hidden }
  #detail { grid-column:2; grid-row:1 }
  h1.home-link { cursor:pointer } h1.home-link:hover { opacity:.82 } h1.home-link:focus-visible { outline:2px solid var(--accent); outline-offset:3px; border-radius:4px }
  /* §2/§13 command-center HOME — 3 sections, prototype tile, no delete */
  .projwrap { padding:22px 24px 70px; max-width:1040px; width:100%; margin:0 auto }   /* width:100% so a flex child with margin:auto stretches to the cap (else it shrinks to content → 1 column) */
  .home-head { display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:6px }
  .home-head h1 { margin:5px 0 2px; font-size:23px; letter-spacing:-.01em }
  .psec { margin-top:24px } .psech { display:flex; align-items:center; gap:10px; margin-bottom:11px }
  .pcount { font-family:ui-monospace,monospace; font-size:11px; color:var(--dim); background:var(--panel2); border:1px solid var(--line); border-radius:999px; padding:1px 8px }
  .pgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:14px }
  .ptile { position:relative; text-align:left; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:15px; min-height:120px; display:flex; flex-direction:column; gap:9px; color:var(--fg); cursor:pointer; transition:.15s }
  .ptile:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 12px 34px -14px rgba(0,0,0,.5) } .ptile:focus-visible { outline:2px solid var(--accent); outline-offset:2px }
  .ptile .pt-top { display:flex; align-items:center; justify-content:space-between; gap:8px }
  .ptile .pt-name { font-weight:640; font-size:16px; font-family:ui-monospace,monospace; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
  .ptile .pt-need { font-size:11px; font-weight:650; color:var(--accent); background:var(--accent-soft,#2b2547); border:1px solid var(--accent); border-radius:999px; padding:2px 8px; flex:0 0 auto; white-space:nowrap }
  .ptile .pt-meta { color:var(--dim); font-size:12.5px; display:flex; gap:7px; align-items:center } .ptile .psep { color:var(--dim); opacity:.5 }
  .pstate { display:inline-flex; align-items:center; gap:6px; font-weight:600 } .pstate .pd { width:8px; height:8px; border-radius:50% }
  .pstate.work { color:var(--online) } .pstate.work .pd { background:var(--online); box-shadow:0 0 0 0 var(--online); animation:ppulse 1.8s infinite }
  .pstate.idle { color:var(--dim) } .pstate.idle .pd { background:var(--dim) }
  .pstate.go { color:var(--accent) } .pstate.go .pd { background:var(--accent); animation:ppulse 1.2s infinite }
  .pstate.susp { color:var(--dim) } .pstate.susp .pd { background:transparent; border:2px solid var(--dim); width:9px; height:9px }
  @keyframes ppulse { 0%{ box-shadow:0 0 0 0 color-mix(in srgb,currentColor 55%,transparent) } 70%{ box-shadow:0 0 0 6px transparent } 100%{ box-shadow:0 0 0 0 transparent } }
  .ptile .pt-foot { margin-top:auto; display:flex; align-items:center; justify-content:space-between; gap:8px; font-size:11.5px; color:var(--dim) }
  .pavs { display:flex } .pav { width:22px; height:22px; border-radius:50%; margin-left:-6px; border:2px solid var(--panel); display:grid; place-items:center; font-size:9px; font-weight:700; color:#fff } .pav:first-child { margin-left:0 }
  .ptile.new { border-style:dashed; align-items:center; justify-content:center; color:var(--dim); gap:5px; text-align:center; font-weight:600 } .ptile.new:hover { color:var(--accent) }
  details.parch { margin-top:18px } details.parch summary { cursor:pointer; list-style:none; display:flex; align-items:center; gap:8px; padding:6px 0; color:var(--dim) } details.parch summary::-webkit-details-marker { display:none }
  /* ☰ drawer + daemon-wide Rooms screen (§13) */
  .ham { display:grid; place-items:center; width:32px; height:32px; border-radius:8px; border:1px solid var(--line); background:var(--panel2); color:var(--dim); font-size:15px; flex:0 0 auto } .ham:hover { color:var(--fg); border-color:var(--accent) }
  .dwrap { position:fixed; inset:0; z-index:60; display:flex } .dscrim { position:absolute; inset:0; background:rgba(0,0,0,.4) }
  .dpanel { position:relative; width:250px; background:var(--panel); border-right:1px solid var(--line); padding:14px 12px; display:flex; flex-direction:column; gap:4px; box-shadow:0 0 40px rgba(0,0,0,.5) }
  .ditem { display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:8px; color:var(--dim); font-size:14px; border:1px solid transparent; background:none; width:100%; text-align:left } .ditem:hover { color:var(--fg); background:var(--panel2) } .ditem.on { background:var(--accent-soft,#2b2547); color:var(--fg); border-color:var(--accent) }
  .ditem .dct { margin-left:auto; font-family:ui-monospace,monospace; font-size:11px; color:var(--dim) }
  .app.rooms-takeover .main { grid-template-columns:1fr } .app.rooms-takeover .list { display:none } .app.rooms-takeover #detail { grid-column:1 / -1 } .app.rooms-takeover .tabwrap { visibility:hidden }
  .rmwrap { padding:24px; max-width:900px; width:100%; margin:0 auto }
  .rmcard { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:15px; margin-bottom:12px }
  .rmcard .rmh { display:flex; align-items:center; gap:10px; margin-bottom:9px; flex-wrap:wrap } .rmcard .rmn { font-weight:640; font-family:ui-monospace,monospace; font-size:14px }
  .rmcard .rmproj { color:var(--dim); font-size:12px; margin-left:auto } .rmcard .rmctrl { display:flex; gap:7px; flex-wrap:wrap }

<script>
const $ = (s, r=document) => r.querySelector(s)
// Escapes & < > " AND ' (→ &#39;). Including the apostrophe closes the latent class where a future
// edit puts an attacker-controllable string into a single-quoted JS context (onclick="f('${esc(x)}')"):
// &#39; HTML-decodes correctly in text, double- AND single-quoted attributes, so esc() is safe in every
// context the dashboard uses — no caller has to remember which quote style it's in.
// #63-A: esc + safeMD are the ONE audited renderer in src/safe-md.js, injected as a <head> <script> by
// rooms-dashboard.js (so the browser runs the same module the node tests import). No inline copy here.
const MRC_TOKEN = (document.querySelector('meta[name=mrc-token]')||{}).content || ''
// Attach the CSRF token to every non-GET request (POST state-changers). A cross-origin page can't read
// MRC_TOKEN (same-origin policy), so it can't forge these. The token is now persisted across daemon
// restarts (#20) so an open tab keeps validating; if it ever still mismatches (HTTP 403), api() stamps
// `_status` so callers can surface a "reload to continue" banner instead of silently swallowing.
const api = (p, o) => {
  if (o && String(o.method||'GET').toUpperCase() !== 'GET') o = { ...o, headers: { ...(o.headers||{}), 'X-MRC-Token': MRC_TOKEN } }
  return fetch(p, o).then(async r => {
    let j; try { j = await r.json() } catch { j = {} }
    if (!r.ok) { if (j.ok===undefined) j.ok = false; j._status = r.status }   // surface HTTP-level failure (403/5xx)
    return j
  })
}
const post = (action, extra={}) => api('/api/action', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ action, ...extra }) })
const postJSON = (path, obj={}) => api(path, { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(obj) })

// State-changing actions MUST confirm success before the UI clears/closes — no optimistic-close (#20).
// act()/actJSON() never throw: a network reject (daemon mid-restart) and a non-2xx both resolve to
// {ok:false,...}. Callers check .ok and only close on success; on failure they keep the item and call
// flashFail(), which surfaces the error — a rotated/again-mismatched token (403) shows a persistent
// "reload to continue" banner; anything else a dismissable error. This is the no-silent-failure floor:
// even with the token persisted, a network blip / 500 / mid-restart must never be swallowed.
const normResult = (r) => (r && r.ok) ? { ok:true } : { ok:false, status: r && r._status, error: (r && r.error) || 'action failed' }
async function act(action, extra={}) { try { return normResult(await post(action, extra)) } catch { return { ok:false, error:'network error — the daemon may be restarting' } } }
async function actJSON(path, obj={}) { try { return normResult(await postJSON(path, obj)) } catch { return { ok:false, error:'network error — the daemon may be restarting' } } }
const isStale = (r) => r && (r.status===403 || /forbidden|x-mrc-token|reload the dashboard/i.test(r.error||''))
function flashFail(r) { S.flash = isStale(r) ? { kind:'stale' } : { kind:'err', text:(r&&r.error)||'action failed' }; renderFlash() }
function renderFlash() {
  const el = $('#flash'); if (!el) return
  if (!S.flash) { el.innerHTML=''; return }
  el.innerHTML = S.flash.kind==='stale'
    ? `<div class="fl stale">⟳ Session refreshed — the daemon restarted. Reload to continue.<button class="btn primary" onclick="location.reload()">Reload</button></div>`
    : S.flash.kind==='note'
    ? `<div class="fl note">ℹ ${esc(S.flash.text)}<span class="x" title="dismiss" onclick="dismissFlash()">✕</span></div>`
    : `<div class="fl err">⚠ ${esc(S.flash.text)}<span class="x" title="dismiss" onclick="dismissFlash()">✕</span></div>`
}
window.dismissFlash = () => { S.flash=null; renderFlash() }
const setOrgUrl = (org) => { try { history.replaceState(null, '', '/'+encodeURIComponent(org||'')) } catch {} }   // /anigame

// 'generalist' (a plain Claude) leads the list — it's the de-emphasized DEFAULT (§13: "default = a plain
// Claude"). architect/critic/adversary stay pickable in Advanced, but the create flow steers to plain
// agents + (Slice B) a cast of characters rather than role-forward teams.
const ROLES = ['generalist','engineer','tester','researcher','user-defender','architect','critic','adversary','ultracritical','designer','sound-designer','composer']
const BACKENDS = ['claude','codex']   // agent backends only — media roles DERIVE their backend (below)
// §5.2 / §13 CAST — the LOCKED four, NOT invented ones. The doc's hard-stop character collapses: architect =
// Colette, images = Thierry (Gemini), critique = Pierre (the caged adversary). Everything else (engineer, tester,
// researcher, user-defender) stays a ROLE you give a plain Claude — NOT a cast character (prototype line 238).
// A CHARACTER is a recurring identity (name + persona + its own persistent, already-authed config volume = P4);
// CLAUDE is the base agent (add many, name by use, role in Advanced). Rendered as the 🎭 modal (openCastModal),
// not chips. login-status ("ready — no login") is the P4 persistent-volume payoff → NOT hardcoded here (honest
// until P4 wires it). Pierre carries NO ★ (§14: an adversary never escalates to the human — spec beats the
// prototype's star:true). caged-Pierre-as-a-roster-member is expressible; its LAUNCH is rebuild-gated (§5 4b).
const CAST = [
  { key:'claude',  name:'Claude',  role:'generalist', label:'plain session', plain:true, generalist:true, blurb:'The base agent — a plain session. Add as many as you like, name them by use, and (in Advanced) optionally give one a role.' },
  { key:'colette', name:'Colette', role:'architect',  label:'architect', character:true, blurb:'Your recurring architect — owns the plan, not the code; breaks the goal into steps and hands them to the engineer. Need an architect? Summon Colette.' },
  { key:'thierry', name:'Thierry', role:'designer',   label:'designer', character:true, worker:true, backend:'gemini', blurb:'Makes image assets (Gemini) on @mention into his territory. Need an image? Summon Thierry.' },
  { key:'pierre',  name:'Pierre',  role:'adversary',  label:'adversary', character:true, caged:true, attach:true, blurb:'The faultfinding step-brother — caged, read-only, grounded in your repo. Need a critic? Summon Pierre. Always Pierre.' },
]
// #42: the role chooser lists built-in roles PLUS this project's custom personas (so a member can pick
// @advertiser). Custom keys that shadow a built-in are de-duped (the parser already forbids alias/media
// shadows, so the only real overlap is an agent-role override, which we show once).
const customRoleKeys = () => Object.keys((S.builder&&S.builder.personas)||{})
const roleOptions = () => ROLES.concat(customRoleKeys().filter(k=>!ROLES.includes(k)))
const aliasRole = (r) => r==='writer'?'engineer':(r==='qa'?'tester':r)
// #44: member-naming. SAFE_NAME mirrors roster.js assertSafeName (#36) for the inline field error — the
// server boundary (parseRoster/team-preview) still enforces it; this is defense-in-depth + fast feedback.
const SAFE_NAME_RE = /^[\p{L}\p{N}](?:[\p{L}\p{N}-]*[\p{L}\p{N}])?$/u
const allBuilderNames = ()=>{ const s=new Set(); for(const t of (S.builder.teams||[])) for(const m of (t.members||[])) if(m.name) s.add(String(m.name).toLowerCase()); return s }
function suggestName(style, taken){ const pool=S.namePools&&S.namePools.pools&&S.namePools.pools[style]; if(!pool||!pool.length) return ''
  const free=pool.filter(n=>!taken.has(n.toLowerCase())); if(free.length) return free[Math.floor(Math.random()*free.length)]
  for(let i=2;;i++){ const c=pool[Math.floor(Math.random()*pool.length)]+i; if(!taken.has(c.toLowerCase())) return c } }
// Fill suggested names for AUTO members (those not hand-typed). Idempotent by default: only fills EMPTY
// auto names (so a re-render never re-rolls a stable name). force=true (style change) clears auto names
// first for a full re-roll. 'custom' style = free-type → leave auto names blank.
function autofillNames(force){ const style=S.builder.nameStyle||'french'
  if(force) for(const t of (S.builder.teams||[])) for(const m of (t.members||[])) if(m._nameAuto!==false) m.name=''
  if(style==='custom' || !S.namePools) return
  for(const t of (S.builder.teams||[])) for(const m of (t.members||[])) if(m._nameAuto!==false && !m.name) m.name=suggestName(style, allBuilderNames()) }
// Which builder members currently resolve to a custom persona key (honoring writer/qa aliases) — the
// local mirror of the server's removal refusal, so the UI warns before the round-trip.
const membersUsingPersona = (k)=>{const out=[];for(const t of ((S.builder&&S.builder.teams)||[]))for(const m of (t.members||[]))if(aliasRole(m.role)===k)out.push((m.role||'engineer')+'@'+(t.name||'?'));return out}
// A media role's backend is fixed by the role (mirrors roster.js/media.js), not a free pick.
const MEDIA_ROLE_BACKEND = { designer:'gemini', 'sound-designer':'elevenlabs', composer:'elevenlabs' }
const mediaBackend = (role) => MEDIA_ROLE_BACKEND[role] || null

const S = {
  building: false, projects: false, roomsHome: false, drawerOpen: false, org: null, selRoom: null, selInbox: null, selMember: null, selHome: false, settingsOpen: false, settings: null, workerLog: '', tab: 'thread', addingTo: null, addCustomRoles: [], showDismissed: false, showHandled: false, replyTo: null, jumpTarget: null, flash: null, roomDrafts: {},
  _wmCur: null, _wmLatest: 0, _openWm: {},   // #63-F unread watermark: the room/channel currently open + its latest position + the per-key captured-at-open boundary
  notifyEnabled: (()=>{ try { return localStorage.getItem('mrc-notify')==='1' } catch { return false } })(),
  notifyPrefs: { chime:true, questions:true, fyis:true },   // server-backed (#42c); loaded once on boot, defaults preserve prior behavior
  teams: { members:[], rooms:[], userInbox:[], orgs:[] }, state: { rooms:[], daemon:{} }, room: null,
  namePools: null,   // #44: {styles, pools} from /api/names, loaded once when the builder opens
  // §13: default = ONE team, ONE plain Claude (role de-emphasized). Named 'Claude' with _nameAuto:false so
  // autofillNames leaves it alone (no scary auto-French team). Role/backend/territory/name-style live behind
  // Advanced; specialists come from the cast (Slice B). repo is per-AGENT (the top-level org repo is gone).
  builder: { org:'', repo:'', advanced:false, personas:{}, _pEdit:null, nameStyle:'french', teams:[ { name:'team', territory:'.', members:[
    {role:'generalist',backend:'claude',lead:true,territory:'',name:'Claude',_nameAuto:false} ] } ] },
}
let paintedKey = null
let _landed = false   // #61: one-time initial-landing guard (land on the active project's home on first load)

// ---- data ----
let _prefsLoaded = false
let _reconcileT = null   // P1: bounded self-poll while a launch is coming up (SSE deltas don't carry starting→serve)
async function tick() {
  if (!_prefsLoaded) { _prefsLoaded = true; api('/api/settings').then(r=>{ if (r && r.ok && r.notify && r.notify.value) S.notifyPrefs = r.notify.value }).catch(()=>{}) }   // #42c: load notify prefs once for the OS-notify gate
  const [t, st] = await Promise.all([ api('/api/teams').catch(()=>S.teams), api('/api/state').catch(()=>S.state) ])
  S.teams = t && t.members ? t : { members:[], rooms:[], userInbox:[], orgs:[] }
  S.state = st && st.rooms ? st : { rooms:[], daemon:{} }
  if (!S.org) S.org = (S.teams.orgs && S.teams.orgs[0] && S.teams.orgs[0].org) || null
  if (_scopedNav) { _scopedNav=false; const has=(S.teams.members||[]).some(m=>!_proj||m.org===_proj); S.building = !has; if (has && _proj) S.org=_proj; if (S.building) { S.builder._fresh = true; markBuilderClean() } }   // #55: baseline the scoped-launch builder entry too; #62: a scoped launch with no existing team is a FRESH build → takeover
  // #61-C: first load with a project active and nothing selected → land on its HOME (not the bare welcome,
  // which now shows only when NO project is active). One-time, so it doesn't fight later navigation.
  if (!_landed && S.org && !S.building && !S.selRoom && !S.selMember && S.selInbox==null) { _landed=true; S.selHome=true; if (!S.settings) loadSettings().then(()=>{ if (S.selHome) tick() }) }
  if (S.selRoom && needRoomFetch()) S.room = await api('/api/room?id='+encodeURIComponent(S.selRoom)).catch(()=>null)
  if (S.selMember) {
    const m = memberByHandle(S.selMember)
    if (m && m.tier==='worker') {
      // #48: /api/worker-log returns parsed call-history { records, legacy }. Keep the transcript-scrape
      // fallback as legacy text (a pre-restart daemon returns no records).
      const r = await api('/api/worker-log?handle='+encodeURIComponent(m.handle)+'&org='+encodeURIComponent(m.org||S.org||'')).catch(()=>null)
      const wl = (r && r.ok) ? { records: Array.isArray(r.records)?r.records:[], legacy: r.legacy||'' } : { records:[], legacy:'' }
      if (!wl.records.length && !wl.legacy) {   // fallback: scrape the team transcript (works on any daemon)
        const room = mergedRooms().find(rr=>rr.team===m.team && rr.kind==='team')
        const rd = room ? await api('/api/room?id='+encodeURIComponent(room.roomId)).catch(()=>null) : null
        if (rd) wl.legacy = (rd.thread||'').split('\n').filter(l=>l.toLowerCase().includes(m.first.toLowerCase())).join('\n')
      }
      S.workerLog = wl
    }
  }
  notifyNewInbox(S.teams.userInbox || [])   // fire OS notifications for @you items that arrived since the last tick
  // P1 launch-reconcile: the SSE delta stream (#69-B) does NOT carry per-member terminal-state transitions
  // (starting/building → serve), so a freshly launched member's terminal would read "isn't launched" until a full
  // re-sync — which only fires on boot / SSE reconnect / a 'roster' delta, i.e. a daemon restart. That's the
  // "never comes up clean without a restart" bug. While ANY org is still coming up, self-schedule a bounded full
  // re-fetch so `serve` lands on its own; it self-terminates once every member is settled (serve/dead/orphaned),
  // and /api/teams is ETag/304-cheap while it runs.
  const _inFlight = (S.teams.launch || []).some(l => l.launching || Object.values(l.members || {}).some(m => m && (m.state === 'starting' || m.state === 'building')))
  clearTimeout(_reconcileT); if (_inFlight) _reconcileT = setTimeout(tick, 2500)
  paint()
}
const needRoomFetch = () => !S.building

// merge live engine team rooms with all room dirs (consult pairings + history)
function mergedRooms() {
  const eng = new Map((S.teams.rooms||[]).map(r => [r.roomId, { ...r, live:true, source:'team' }]))
  const out = []
  for (const r of (S.state.rooms||[])) {
    const e = eng.get(r.roomId)
    if (e) { out.push({ ...e, unreviewed:r.unreviewed, updatedAt:r.updatedAt }); eng.delete(r.roomId) }
    else out.push({ roomId:r.roomId, team:null, kind:(r.a&&r.b?'consult':'room'), state:r.state, live:!!r.live, turn:r.turn, members:[], unreviewed:r.unreviewed||0, updatedAt:r.updatedAt||0, a:r.a, b:r.b, source:'room' })
  }
  for (const e of eng.values()) out.push({ ...e, unreviewed:0, updatedAt:Date.now() })
  return out.sort((x,y)=>(Number((y.unreviewed||0)>0)-Number((x.unreviewed||0)>0))||(Number(!!y.live)-Number(!!x.live))||((y.updatedAt||0)-(x.updatedAt||0)))
}
const inOrg = (r) => !S.org || r.org===S.org   // team rooms carry org; org-less consults are NOT in any org
const orgMembers = () => (S.teams.members||[]).filter(m => !S.org || !m.org || m.org===S.org)
function inbox() {
  // Scope the @you queue to the ACTIVE project — items carry their org (#8). An item is OPEN until
  // answered or dismissed (#11). Questions (ask_user) are actionable; notifications (plain @user) are
  // FYI — split so they render + count differently. Legacy/undefined type → notification (safe default).
  const all = (S.teams.userInbox||[]).filter(q => q.org===S.org)
  const open = all.filter(q => !q.answered && !q.dismissed)
  // (d): a QUIET triaged QUESTION is with its lead, not you yet — it must NOT nag (excluded from questions/need).
  // It surfaces in `triaging` (in-flight, no badge); it moves into `questions` only when the timer/lead escalates
  // it LOUD (quiet flips false). `leadHandled` = the REQUIRED audit surface: items a lead resolved ON YOUR
  // BEHALF (resolvedByLead) — always visible so a lead can't quietly bury a dissent it was the subject of.
  const questions = open.filter(q => q.type==='question' && !q.quiet)
  const notifications = open.filter(q => q.type!=='question')   // FYIs (incl. quiet lead-copies); never nag
  const triaging = open.filter(q => q.quiet && q.triage && !q.triage.fyi)
  // resolvedByLead is answered=true → it can't fall into `dismissed` (which is answered-FALSE). We filter on
  // resolvedByLead ALONE (not `&& !dismissed`) ON PURPOSE (Pierre): a lead-handled item that ever ALSO became
  // dismissed would otherwise land in NO section (live excludes resolvedByLead; dismissed excludes answered) →
  // INVISIBLE, the exact bury this surface prevents. It stays here always. If a "mark reviewed / dismiss"
  // action is ever added to the audit list, render a "reviewed" state on `q.dismissed` items — do NOT drop them.
  const leadHandled = all.filter(q => q.resolvedByLead)
  const dismissed = all.filter(q => q.dismissed && !q.answered)   // recoverable via the show-dismissed toggle
  const cu = mergedRooms().filter(r => (r.unreviewed||0)>0 && inOrg(r))
  return { all, open, questions, notifications, triaging, leadHandled, dismissed, cu, need: questions.length + cu.reduce((a,c)=>a+(c.unreviewed||0),0) }
}
// Per-project needs-you count (drives each tab's badge): open QUESTIONS only + unreviewed catch-ups in
// that org — notifications never nag. Strict org match (harmonized with inbox()). Derived, not stored.
function orgNeed(org) {
  const qs = (S.teams.userInbox||[]).filter(q => q.org===org && q.type==='question' && !q.answered && !q.dismissed && !q.quiet).length   // (d): a quiet triaged question is with its lead — no badge until it escalates
  const cu = mergedRooms().filter(r => (r.unreviewed||0)>0 && r.org===org).reduce((a,c)=>a+(c.unreviewed||0),0)
  return qs + cu
}
// A project is "running" if it has a launch record or any live member up (online/launched).
// A launch record only counts as "running" if the daemon reconciled it as live (≥1 member session up,
// or still building) — a stale record from a crash reports running:false, so ▶ Resume/🚀 Launch comes back.
const orgRunning = (org) => (S.teams.launch||[]).some(l=>l.org===org && l.running) || (S.teams.members||[]).some(m=>m.org===org && m.tier==='live' && (m.online||m.launched))
// P1a: the daemon reports a provisional `launching` record (org comes up live in one gesture — no "stopped" flash)
// and flips it to `failed` on a build error / 3-min timeout instead of a phantom-running org.
const orgLaunchRec = (org) => (S.teams.launch||[]).find(l=>l.org===org)
const orgLaunching = (org) => !!(orgLaunchRec(org)||{}).launching
const orgFailed = (org) => !!(orgLaunchRec(org)||{}).failed
function switchOrg(org) { if (org===S.org) return; if (!confirmLeaveBuilder()) return; leaveUnread(); S.org=org; S.selRoom=S.selInbox=S.selMember=null; S.building=false; S.projects=false; S.roomsHome=false; S.selHome=true; if (!S.settings) loadSettings().then(()=>{ if (S.selHome) tick() }); setOrgUrl(org); paint() }   // #55-1: guard a dirty build; #61: entering a project lands on its home
window.switchOrg = switchOrg

// Browser-style project tabs: one per defined org. Chrome-stable — tabs keep a FIXED position
// (definition order); SELECTING a tab only changes which is highlighted, it never reorders the strip
// (a tab jumping to the front on click was the instability @user flagged). Many tabs → the strip
// scrolls horizontally and the active one is scrolled into view (no truncation/overflow menu, so the
// active tab is always reachable without moving anything). Each tab: state dot, needs-you badge, an ✕
// that SUSPENDS (stop + preserve), and a trailing ＋ → Build.
function renderTabs() {
  const el = $('#tabs'); if (!el) return
  const orgs = (S.teams.orgs||[]).map(o=>o.org)   // STABLE order — never re-sorted by active/running state
  const tab = (o) => {
    const need = orgNeed(o), cls = o===S.org ? 'active' : orgRunning(o) ? 'running' : 'closed'
    // A pending Telegram link is a "verify me" event — surfaced on the OWNING tab regardless of which
    // tab is active (#14 B), and visually DISTINCT from the ❓ needs-you badge (a 🔗, not an answer count).
    const link = (S.teams.telegram||{})[o]?.pending?.length || 0
    // #65: the org rides a data-attr (esc IS correct for attr-VALUE context); the onclick is a FIXED string
    // reading this.dataset.org — never interpolates the value into a JS-string-in-attribute (the XSS class).
    return `<div class="ptab ${cls}" data-org="${esc(o)}" onclick="${o===S.org?'openProjectHome()':'switchOrg(this.dataset.org)'}" title="${esc(o)} · ${orgRunning(o)?'running':'stopped'} — ${o===S.org?'open project home':'switch'}">`
      + `<span class="pdot"></span><span class="pname">${esc(o)}</span>`
      + (link?`<span class="plink" title="Telegram link awaiting your confirmation${link>1?` (${link})`:''}">🔗${link>1?link:''}</span>`:'')
      + (need?`<span class="pbadge" title="${need} need you">${need}</span>`:'')
      + `<span class="pclose" title="Close (stop agents, keep the team)" onclick="event.stopPropagation();closeTab(this.closest('.ptab').dataset.org)">✕</span></div>`
  }
  el.innerHTML = orgs.map(tab).join('') + `<div class="ptab add" title="New project (Build)" onclick="newProject()">＋</div>`
  const act = el.querySelector('.ptab.active')
  if (act && act.scrollIntoView) { try { act.scrollIntoView({ inline:'nearest', block:'nearest' }) } catch {} }
  requestAnimationFrame(updateTabHints)   // #2a E: after layout, surface off-screen needs-you counts
}
// #2a E: sum the ❓ needs-you on tabs scrolled fully out of the strip, on each side, into a clickable
// "‹N" / "N›" edge hint — so a needy project is never silently hidden off-screen. Keyboard-operable
// (the hints are <button>s). Recomputed after render, on strip scroll, and on resize.
function updateTabHints() {
  const el = $('#tabs'), L = $('#tabHintL'), R = $('#tabHintR'); if (!el || !L || !R) return
  let needL = 0, needR = 0
  for (const t of el.querySelectorAll('.ptab')) {
    const badge = t.querySelector('.pbadge'); if (!badge) continue
    const n = parseInt(badge.textContent, 10) || 0; if (!n) continue
    const left = t.offsetLeft - el.scrollLeft, right = left + t.offsetWidth
    if (right < 24) needL += n                       // fully off the left edge
    else if (left > el.clientWidth - 24) needR += n  // fully off the right edge
  }
  L.hidden = !needL; R.hidden = !needR
  if (needL) L.textContent = '‹' + needL
  if (needR) R.textContent = needR + '›'
}
window.scrollTabs = (dir) => { const el = $('#tabs'); if (!el) return; el.scrollBy({ left: dir * Math.max(120, el.clientWidth * 0.7), behavior: 'smooth' }); setTimeout(updateTabHints, 360) }
// Close a tab = SUSPEND: stop the member containers but keep the team defined, transcripts, and
// history — the tab stays as closed-dormant and ▶ Resume brings it back. (Delete is deferred.)
window.closeTab = async (org) => {
  if (!confirm(`Close "${org}"? Members stop; the team, transcripts, and history stay — reopen to resume.`)) return
  if (org === S.org) leaveUnread()   // #63-F: closing the active project leaves its open room — flush its watermark
  const r = await actJSON('/api/team-stop', { org }); if(!r.ok)return flashFail(r); S.flash=null
  tick()
}
// Resume = relaunch the saved roster (deterministic members rebind, each --continues its own convo).
window.resumeTeam = async (org) => { const r=await actJSON('/api/team-launch', { org: org||S.org }); if(!r.ok)return flashFail(r); S.flash=null; tick() }
// Readiness: workers are on-demand; a live member is 'ready' once its channel registers, 'starting'
// while its terminal is up but not connected yet (loading / awaiting login).
function memberState(m) {
  if (m.tier==='worker') return { cls:'worker', label:'on-demand' }
  if (m.online) return { cls:'ready', label:'ready' }
  if (m.launched) return { cls:'starting', label:'starting — open Console' }
  return { cls:'off', label:'offline' }
}
const memberByHandle = (h) => orgMembers().find(m => m.handle===h)
const roomMembers = (id) => { const r=(S.teams.rooms||[]).find(x=>x.roomId===id); return r ? r.members.filter(x=>x!=='@user') : [] }

// ---- painting ----
const launchFor = () => (S.teams.launch||[]).find(x=>x.org===S.org && x.running)   // a stale (crashed) launch is not a terminal
// #47: the @you channel's detailKey uses channelSig() (folds every item's RESOLUTION into the key, so a
// REMOTE resolve — e.g. answered via Telegram — re-renders the channel) and FREEZES while composing.
const detailKey = () => S.building ? 'build'
  : S.roomsHome ? 'roomshome:'+mergedRooms().map(r=>r.roomId+':'+r.state).join(',')   // §13 daemon Rooms screen
  : S.projects ? 'projects:'+projectsSig()   // P2: re-render the landing when any project's state/needs-you changes
  : S.selHome ? 'home:'+(S.org||'')+':'+(S.settings?'s':'-')   // #61: rebuild once settings load (for the --web note)
  : S.selMember ? (memberByHandle(S.selMember)?.tier==='worker' ? 'wlog:'+S.selMember : 'terminal:'+S.selMember+':'+(launchFor()?.members?.[S.selMember]?.state||'none'))
  : S.selInbox!=null ? 'channel:'+(S.org||'')+':'+channelSig()
  : S.selRoom ? 'room:'+S.selRoom+':'+S.tab
  : 'empty'

function paint() {
  // topbar
  const ib = inbox()
  const dp = $('#daemonPill'); const up = (S.state.daemon&&S.state.daemon.running) || (S.teams.members||[]).length>0
  dp.className = 'pill '+(up?'on':'off'); dp.textContent = up?'daemon up':'daemon down'
  updateNotifyBtn()
  renderTabs()   // project tabs replace the old org dropdown + global needs-you pill (per-tab badges)
  // #62: a FRESH new-project build takes over the full view (CSS hides the tabs + contextual list, builder
  // fills width); editing an existing team stays the in-place subpanel. Re-evaluated every paint; ✕ Cancel
  // (S.building=false) drops the class and restores the layout.
  $('.app').classList.toggle('build-takeover', S.building && builderIsFresh())
  $('.app').classList.toggle('projects-takeover', S.projects && !S.building)   // P2: the command-center Projects landing
  $('.app').classList.toggle('rooms-takeover', S.roomsHome && !S.building)   // §13: the daemon-wide Rooms screen
  drawerRender()
  if (!S.addingTo) renderMain()   // freeze the list while the add-member form is open (don't clobber inputs)
  const key = detailKey()
  if (key!==paintedKey) { renderDetail(); paintedKey=key } else patchDetail()
  syncTermHost()   // #40: keep-alive terminal overlay (shows the selected member's persistent iframe)
  renderFlash()   // keep a surfaced failure (#20) visible across re-renders until reload/dismiss
}

// D9: a summoned adversary shows as one side of a consult room. The DAEMON knows which side is contained
// (its `adversaries` Set) and stamps r.aAdversary / r.bAdversary per pairing — badge that side with ⚔.
// Flag-driven (not a browser name-match): a session literally named "Pierre" can't false-badge, and the
// flag is absent (not mis-guessed) on a historical room with no live adversary. Plain emoji → esc-safe.
const markAdv = (nm, isAdv) => isAdv ? `${nm} ⚔` : nm
const label2 = (r) => r.a&&r.b ? `${markAdv(r.a, r.aAdversary)} ⇄ ${markAdv(r.b, r.bAdversary)}` : r.roomId
// Friendly label for a room's pauseReason, so a Paused badge says WHY (turn-cap check-in vs a deliberate
// brake vs a stall) — a routine check-in reads very differently from a real hold.
const pauseLabel = (x) => ({ turnCap:'turn-cap', brake:'brake', stall:'stall' }[x] || x)
// #31 a11y: keyboard-activate a whole-row-click `role="button"` row on Enter/Space → fire the element's OWN
// onclick (reuses the action, no duplicated/interpolated logic → #65-clean). Space MUST preventDefault or a
// focused row scroll-jumps the page. Enter+Space both on keydown (the keyup-cancel nuance is for destructive
// buttons, not nav rows). ONLY applied to rows with NO inner interactive control (else it's nested-interactive).
function kbd(e, el) { if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); el.click() } }
const roomRow = (r) => `<div class="rm ${r.roomId===S.selRoom?'sel':''}" data-room="${esc(r.roomId)}" role="button" tabindex="0" aria-label="Open room ${esc(r.team||label2(r))}" onclick="selRoom(this.dataset.room)" onkeydown="kbd(event,this)" title="${r.turn!=null?`${r.turn} messages exchanged${r.turnCap?` — checks in with you at ${r.turnCap}`:''}`:''}"><span class="nm">${esc(r.team||label2(r))}</span><span class="state ${r.state}">${esc(r.state)}${r.state==='Paused'&&r.pauseReason?` · ${esc(pauseLabel(r.pauseReason))}`:''}</span><span class="meta">${esc(r.kind||'')}${r.turn?` · ${r.turn} msgs`:''}${r.unreviewed?` · ${r.unreviewed}📥`:''}</span></div>`
const teamRunning = (ms) => { const live=ms.filter(m=>m.tier==='live'); return !live.length || live.some(m=>m.online||m.launched) }
// #64: per-member context gauge — a thin vertical fill (% of the context window used), color by threshold, with
// the exact % + the session NAME in the tooltip. The name is UNTRUSTED text → esc()'d; it renders only in an
// HTML-attribute (title/aria-label) TEXT context, never a JS-string/handler, so esc is the right tool (not the
// #65 data-attr case). c is a daemon-clamped number (0–100). No status yet → the empty reserved strip ("—").
function ctxBar(m) {
  const st = m.status, c = st && typeof st.context === 'number' ? st.context : null
  const nm = st && st.name ? st.name + ' · ' : ''
  if (c == null) return `<span class="membar" aria-hidden="true" title="${esc(nm)}context —"></span>`
  // thresholds MIRROR the container statusline (WARN 60 / COMPACT 77 — Claude reserves ~15% for compaction),
  // so the dashboard gauge and the in-terminal statusline agree on green/amber/red for the same metric.
  const cls = c >= 77 ? 'r' : c >= 60 ? 'y' : 'g'
  return `<span class="membar ${cls}" role="meter" aria-valuenow="${c}" aria-valuemin="0" aria-valuemax="100" style="background:linear-gradient(to right, currentColor ${c}%, var(--line) ${c}%)" title="${esc(nm)}${c}% context used" aria-label="${c}% context used"></span>`
}
// #64: the active org's rate-limit (5h/7d) — set ONLY from the lead's session (the engine drops a non-lead's
// rail report), so it's the shared team gauge. null until the lead reports.
const orgRateLimit = () => { const o = (S.teams.orgs||[]).find(x=>x.org===S.org); return (o && o.rateLimit) || null }

// One scrolling overview: @you (your messages) on top, then Teams, then Rooms.
function renderMain() {
  const mid = $('#mid')
  const ib = inbox()
  const byTeam = {}; for (const m of orgMembers()) (byTeam[m.team] ||= []).push(m)
  const teams = Object.keys(byTeam)
  const memberRow = (m) => { const s=memberState(m); const c=m.status&&typeof m.status.context==='number'?m.status.context:null; const ctxNote=(c!=null&&c>=60)?` — context ${c}%`:''   /* #31: surface the gauge level to SR on row focus (the row aria-label suppresses the inner meter's name) — only when amber/red (c≥60, the gauge's own threshold); the exact % self-conveys high-vs-elevated. Green rows stay clean. */
    return `<div class="mem ${m.lead?'lead':''} ${m.handle===S.selMember?'sel':''}" data-h="${esc(m.handle)}" role="button" tabindex="0" aria-label="Open ${esc(m.first)}, ${esc(m.role)}${m.lead?', lead':''}${ctxNote}" onclick="selMember(this.dataset.h)" onkeydown="kbd(event,this)" title="${m.tier==='worker'?'on-demand — click for activity':'click for terminal'}"><span class="dot ${s.cls}"></span><div class="who"><div class="nm">${esc(m.first)}${m.lead?' <span class="leadstar" title="lead">★</span>':''}</div><div class="role">${esc(m.role)} <span class="bk">· ${esc(m.backend)}</span></div></div><span class="mstate ${s.cls}">${esc(s.label)}</span>${ctxBar(m)}</div>` }
  const teamCard = (t) => { const ms=byTeam[t]; const running=teamRunning(ms)
    return `<div class="team"><div class="tn">${esc(t)}${running?'':' <span class="state Paused" style="font-size:10px;padding:1px 6px">not running</span>'}</div>${ms.map(memberRow).join('')}
      ${S.addingTo===t ? amForm(t) : `<div class="row" style="margin-top:8px;gap:6px"><button class="btn tiny" data-team="${esc(t)}" onclick="startAddMember(this.dataset.team)">＋ add agent</button></div>`}</div>` }

  // @you: open QUESTIONS (actionable, badged) first, then notifications (FYI, muted, dismiss-only),
  // then catch-ups. The header badge counts questions only — notifications never inflate it (#11).
  // #47: @you collapses to ONE selectable row → opens the inbox CHANNEL in col3 (the per-item stack +
  // dismissed toggle moved into the channel). Badge counts open QUESTIONS only; the FYI count is muted.
  let html = `<h2 class="you">@you</h2>`
    + `<div class="rm you-row ${S.selInbox!=null?'sel':''}" role="button" tabindex="0" aria-label="Open your @you channel${ib.questions.length?`, ${ib.questions.length} need you`:''}" onclick="selInbox('channel')" onkeydown="kbd(event,this)" title="Open your @you channel"><span class="nm">@you${ib.questions.length?` <span class="badge">${ib.questions.length}</span>`:''}</span><span class="meta">${ib.open.length?`${ib.open.length} message${ib.open.length===1?'':'s'}${ib.notifications.length?` · ${ib.notifications.length} FYI`:''}`:'all clear'}</span></div>`
  if (ib.cu.length) html += ib.cu.map(r=>`<div class="rm" data-room="${esc(r.roomId)}" role="button" tabindex="0" aria-label="Open catch-ups for ${esc(r.team||r.roomId)}" onclick="selRoom(this.dataset.room,true)" onkeydown="kbd(event,this)"><span class="nm">${esc(r.team||r.roomId)}</span><span class="meta">${r.unreviewed} catch-up${r.unreviewed>1?'s':''}</span></div>`).join('')

  // Reopen panel (T7): the active project is defined but not running → explicit ▶ Resume, with the
  // honest cold-image + per-live-member Channels-accept expectation (no surprise multi-minute spin-up).
  if (S.org && orgLaunching(S.org)) {
    // P1a: the launch landed — show it coming up (never the "stopped" panel) while the image builds + members register.
    html += `<div class="resume"><h3>🚀 launching "${esc(S.org)}"…</h3>`
      + `<div class="step">Pinning the project, building the image (first run ~minutes), and starting the agents. This panel updates itself the moment they come up — nothing to do.</div></div>`
  } else if (S.org && orgFailed(S.org)) {
    html += `<div class="resume"><h3>⚠ "${esc(S.org)}" didn't launch</h3>`
      + `<div class="step">${esc((orgLaunchRec(S.org)||{}).error || 'the launch failed — check the console for details')}</div>`
      + `<div style="margin-top:10px"><button class="btn launch" data-org="${esc(S.org)}" onclick="resumeTeam(this.dataset.org)">↻ Retry launch</button></div></div>`
  } else if (S.org && teams.length && !orgRunning(S.org)) {
    const live = orgMembers().filter(m=>m.tier==='live')
    html += `<div class="resume"><h3>⏸ "${esc(S.org)}" is stopped</h3>`
      + `<div class="step">Resume relaunches the saved team — each live agent <b>--continues its own conversation</b> from where it left off.</div>`
      + `<div class="step">First run rebuilds the image (~minutes); each live agent comes up in its Console${live.length?`: ${live.map(m=>'@'+esc(m.first)).join(', ')}`:''}. Workers are on-demand.</div>`
      + `<div style="margin-top:10px"><button class="btn launch" data-org="${esc(S.org)}" onclick="resumeTeam(this.dataset.org)">▶ Resume team</button></div></div>`
  }

  if (teams.length) html += `<h2>Teams</h2>` + teams.map(teamCard).join('')
  // `others` = genuinely org-LESS rooms (legacy 2-party consults / history) — and only when a project
  // is active. NOT `!inOrg` (= every room of a DIFFERENT org), which would mislabel another active
  // project's live team rooms as "Consults & history" on this tab; those belong on their OWN tab via
  // `inOrg`. The `&& S.org` guard preserves the zero-org case (consult-only user, S.org null): such
  // rooms are in `mine` (inOrg is true when S.org is null), so excluding them from `others` avoids a
  // double-render and doesn't hide a consult-only user's only content under a collapsed disclosure.
  const rs = mergedRooms(); const mine = rs.filter(inOrg)
  if (mine.length) html += `<h2>Rooms</h2>` + mine.map(roomRow).join('')
  // #46: the left panel leads with @you / Teams / Rooms and ends here. Consults & history, the
  // all-containers kill-list, ⚙ Settings (now the header gear → modal), and Delete project (now the
  // modal's Danger zone) all moved OUT of the rail.
  html += `<div style="margin:14px 0 8px;display:flex;gap:8px">${teams.length?`<button class="btn" style="flex:1" onclick="openBuilder()">✎ Edit teams</button>`:''}<button class="btn ${teams.length?'':'primary'}" style="flex:1" onclick="newProject()">＋ New project</button></div>`
  html += `<div style="height:18px"></div>`
  mid.innerHTML = html
}
// The add-member backend control: a generic claude/codex select for agent roles, or a locked,
// role-derived backend for media roles (kept in a hidden #amBackend so submitAddMember reads it the same).
function amBackendControl(role) {
  const mb = mediaBackend(role)
  if (mb) return `<span class="bklock" style="flex:1" aria-label="backend ${esc(mb)} — set by the media role, not editable" title="media role — backend is set by the role (not editable)">${esc(mb)}</span><input type="hidden" id="amBackend" value="${esc(mb)}">`
  // Preserve a prior agent pick across role changes (mirror bSet): read the current control's value
  // BEFORE it's replaced; only reset to claude when it isn't a valid agent backend (e.g. coming from a media role).
  const prev = $('#amBackend') && $('#amBackend').value
  const cur = BACKENDS.includes(prev) ? prev : 'claude'
  return `<select id="amBackend" style="width:100%">${BACKENDS.map(b=>`<option ${b===cur?'selected':''}>${b}</option>`).join('')}</select>`
}
window.amSyncBackend = ()=>{ const w=$('#amBackendWrap'); if(w) w.innerHTML = amBackendControl($('#amRole').value) }
function amForm(t) {

    <div class="row" style="margin-top:6px"><button class="btn tiny" onclick="openCastModal('project')">🎭 Add from cast</button></div>
  </div>`

// ---- detail renderers ----
function renderDetail() {
  const d = $('#detail')
  if (S.building) return renderBuilder(d)
  if (S.roomsHome) return renderRoomsHome(d)
  if (S.projects) return renderProjects(d)
  if (S.selHome) return renderProjectHome(d)
  if (S.selMember) return renderMember(d)

function syncTermHost() {

    // stale → a blank iframe = silent-broken). #detail shows the orphaned/Relaunch copy instead.
    if (info && info.state === 'serve' && info.ttydUrl) target = { key: S.org+'|'+m.handle, url: info.ttydUrl, m }
  }
  // teardown: any block whose member is no longer SERVING (stopped/removed/suspended/org gone, OR it just
  // transitioned serve→orphaned) — removes the iframe → closes its ws, no stale blank embed.
  const liveKeys = new Set()
  for (const l of (S.teams.launch||[])) if (l.running && l.members) for (const h of Object.keys(l.members)) if (l.members[h] && l.members[h].state === 'serve') liveKeys.add(l.org+'|'+h)

  // relaunch / suspend→resume) — whose iframe genuinely re-mounts blank — re-shows the "Connecting…" cover.
  // A member-SWITCH only hides blocks (display:none, below) and never teardown (still in liveKeys), so the
  // placeholder correctly stays once-per-session there. Banner-dismiss is intentionally NOT cleared: "earlier
  // output isn't replayed" is a one-time FYI (re-nagging it every relaunch is annoying), and the re-shown
  // placeholder's own sub-copy re-carries that line transiently, so the relaunch blank stays explained.
  for (const b of [...host.children]) if (!liveKeys.has(b.dataset.key)) { _termPlaceholderShown.delete(b.dataset.key); b.remove() }   // removes the iframe → closes its ws
  if (!target) { host.style.display='none'; detail.style.display=''; return }
  let block = [...host.children].find(b => b.dataset.key===target.key)
  const online = !!target.m.online   // recomputed every paint → the banner appears once the member registers
  if (!block) {

    // switch reuses the existing block). dtach relays only bytes emitted AFTER attach, so an idle agent's
    // screen stays blank until new output; we can't read inside the iframe or get a byte-signal (Q2). So a
    // placeholder over the iframe (shown once per member per session, time-revealed ~1.7s, pointer-events:none

    block = document.createElement('div'); block.className='termblock'; block.dataset.key=target.key

      ? `<div class="tp-main">Connecting to @${f}'s terminal…</div><div class="tp-sub muted">You're attached to the live session — @${f}'s <b>live screen from here</b>; earlier output isn't replayed.</div>`
      : `<div class="tp-main">First launch — activate @${f}</div><div class="tp-sub muted">Log in here to put @${f} to work.</div>`
    block.innerHTML = `<div class="termhdr"></div>`
      + `<div class="termbanner">↑ You're seeing @${f}'s <b>live screen from here</b> — earlier output before you opened this isn't replayed.<span class="bx" role="button" tabindex="0" title="dismiss" data-key="${esc(target.key)}" onclick="dismissTermBanner(this.dataset.key)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();dismissTermBanner(this.dataset.key)}">✕</span></div>`
      + `<div class="termwrap"><iframe class="termframe" title="@${f} terminal" src="${esc(target.url)}"></iframe>`
      + (showPh ? `<div class="termplaceholder">${phCopy}</div>` : '')

    if (showPh) { _termPlaceholderShown.add(target.key); const ph=block.querySelector('.termplaceholder'); if(ph) setTimeout(()=>{ if(document.contains(ph)) ph.classList.add('hide') }, 1700) }   // time-reveal; guard a torn-down block
  }

  // banner: only for ONLINE members (history-not-replayed is the active-agent issue; a not-yet-online member
  // shows the login placeholder instead), and not dismissed for this org|handle this session.

const relTime = (at)=>{ try{ const s=Math.round((Date.now()-new Date(at).getTime())/1000); if(s<5)return 'just now'; if(s<60)return s+'s ago'; const mn=Math.round(s/60); if(mn<60)return mn+'m ago'; const h=Math.round(mn/60); if(h<24)return h+'h ago'; return Math.round(h/24)+'d ago' }catch{ return '' } }

function workerCardHTML(rec, k) {

  // for pre-JSONL records that lack the field — so a SUCCESSFUL call whose text merely starts with
  // "[@x couldn't find Y, but…]" isn't mislabelled failed.
  const fail = (typeof rec.ok === 'boolean') ? !rec.ok : WFAIL_RE.test(String(rec.result||''))
  const req = (rec.askers||[]).map(a=> a.directive
    ? `<div class="wask directive" title="trusted [Human directive]/[Human reply]">⦉ ${esc(a.text)} ⦊</div>`
    : `<div class="wask"><b>${esc(a.from||'@?')}</b> <span class="muted">→</span> ${esc(a.text)}</div>`).join('')

  if (fail) result = `<div class="wfail">${esc(rec.result||'(failed)')}</div>`
  else if (rec.asset) { const a=rec.asset; const fn=String(a.path||'').split('/').pop(); const kb=a.bytes?` · ${(a.bytes/1024).toFixed(0)} KB`:''
    // #48b image → lazy thumbnail from the path-guarded /api/asset, wrapped in a real <a> so it's keyboard-
    // focusable + Enter-opens full-size (noopener; served nosniff → renders as an image). #48c mp3 → an inline
    // <audio controls> behind the SAME guard, preload=none so bytes load only on play. alt/title = the
    // generation prompt (descriptive for a screen reader) else the filename. onerror fails closed to the

      ? `<a href="${esc(src)}" target="_blank" rel="noopener" title="open full size"><img class="wthumb" loading="lazy" src="${esc(src)}" alt="${esc(a.prompt||fn)}" onerror="this.closest('a')?.remove()"></a>`

  d.innerHTML = `<div class="ich-wrap">${triage}<div class="ich-scroll" id="ichScroll" tabindex="0"${triage?' style="padding-top:36px"':''}><div id="ichFeed"></div>${emptyMsg}${handled}${dism}</div></div>`
  const feedHost = $('#ichFeed'); if (feedHost) feedHost.appendChild(feedFrag)   // #63-B2-inbox: the slackRow DOM feed
  const sc = $('#ichScroll'); if (!sc) return
  if (S.replyTo!=null) { const tx=$('#ansTx'); if(tx){ try{tx.focus()}catch{} } const row=$('#q'+S.replyTo); if(row)row.scrollIntoView({block:'center'}) }
  // #47 MED-2: a numeric selInbox (OS-notification click) sets a one-shot jumpTarget → scroll to + highlight
  // that item's #q<id>; falls back to the followScroll position if it's not in the live feed.
  else if (S.jumpTarget!=null) { const did=jumpToQ(S.jumpTarget); S.jumpTarget=null; if(!did) sc.scrollTop = wasAtBottom ? sc.scrollHeight : prevTop }
  // #47 MED-1: stick to the bottom only if the user was already there; otherwise keep their position.
  // #68: a FIRST open (no retained #ichScroll) → bottom, DEFERRED past layout — reading scrollHeight synchronously
  // right after the innerHTML/append can be stale if the flex:1 scroll container isn't sized yet, pinning ~top
  // (the open-at-top bug). A re-render/poll keeps the no-yank retention (synchronous wasAtBottom?bottom:prevTop).
  else if (!prevSc) { sc.scrollTop = sc.scrollHeight; requestAnimationFrame(() => { const e = $('#ichScroll'); if (e) e.scrollTop = e.scrollHeight }) }
  else sc.scrollTop = wasAtBottom ? sc.scrollHeight : prevTop
  wireUnreadPill(sc)   // #63-F: jump-to-unread pill when the divider is above the viewport
}

// ---- builder ----

// live, mutable org input (#55's builderEditing heuristic), which could flip true mid-type if you typed a name
// colliding with an existing org, reflowing the whole layout. Stable by intent. (Closes the deferred #55 title nit.)
function builderIsFresh() { return !!(S.builder && S.builder._fresh) }
function renderBuilder(d) {

  fetch('/api/team-presets').then(r=>r.json()).then(d=>{ const sel=$('#bPreset'); if(!sel)return
    sel.innerHTML='<option value="">— preset —</option>'+(d.presets||[]).map(p=>`<option value="${esc(p.name)}">${esc(p.title)}</option>`).join('')
    sel.onchange=()=>{ const p=(d.presets||[]).find(x=>x.name===sel.value); if(!p)return; S.builder.teams=JSON.parse(JSON.stringify(p.roster.teams)); autofillNames(); renderBuilder($('#detail')) } }).catch(()=>{})

  else autofillNames()

// P1 repo-picker: refresh the quick-pick source for the current builder org. Re-fetched on org change (the
// this-project set is org-scoped) — best-effort, empty on failure. Re-renders teams so the chips/datalist appear.
function bLoadRepoPicks() {
  const org = (S.builder && S.builder.org) || ''
  fetch('/api/repos?org=' + encodeURIComponent(org)).then(r=>r.json()).then(d=>{
    if (!d || !d.ok || !S.building) return
    S.builder._repoPicks = { authorized: d.authorized || [], recent: d.recent || [] }
    S.builder._repoPicksOrg = org
    bRenderTeams()
  }).catch(()=>{})
}
// A labeled row of repo quick-pick chips (empty → nothing). shortRepo trims to the last two path segments so the
// chip is scannable; the full path is the title + what gets picked.
function repoPickRow(label, list, ti, mi) {
  if (!list || !list.length) return ''
  return `<div class="memrow reporecents" style="margin-top:3px;gap:5px;flex-wrap:wrap;align-items:center"><span class="muted" style="font-size:10.5px;flex:0 0 auto;text-transform:uppercase;letter-spacing:.04em">${esc(label)}</span>${list.slice(0,8).map(p=>`<button class="btn tiny" title="${esc(p)}" data-p="${esc(p)}" onclick="bPickRepo(${ti},${mi},this.dataset.p)">${esc(shortRepo(p))}</button>`).join('')}</div>`
}
function shortRepo(p) { const s=String(p||'').replace(/\/+$/,''); const parts=s.split('/').filter(Boolean); return parts.length<=2 ? s : '…/'+parts.slice(-2).join('/') }
// 📁 Choose… → the in-app folder browser; on pick, reuse bPickRepo (fills the field + the EXISTING cap-gated
// authorize). The browse endpoint is a pure read; the grant stays /api/authorize-repo. Two gates, never conflated.
window.fcOpen = (ti,mi) => openFolderChooser((path) => bPickRepo(Number(ti), Number(mi), path))
// §3/§13 Session picker — after a repo is picked, "the GUI for mrc pick": fresh, or a prior session in that repo
// (the owner's own sessions only — the endpoint reads the getId(repoPath) slice, disjoint from any member slice).
window.bSetSession = (ti,mi,v) => { const m=S.builder.teams[ti]?.members[mi]; if(m){ m.session=v } bPreview() }
function sessLabel(s) { const nm = s.name || s.preview || String(s.id||'').slice(0,8); return nm + (s.ts ? ' · ' + relTime(s.ts) : '') }
async function bLoadSessions(ti,mi) {
  const m = S.builder.teams[ti]?.members[mi]; if(!m || !m.repo) return
  const repo = m.repo; m._sessLoading = true
  const r = await api('/api/repo-sessions?repo='+encodeURIComponent(repo)).catch(()=>({ok:false}))
  const cur = S.builder.teams[ti]?.members[mi]; if(!cur || cur.repo!==repo) return   // repo changed mid-flight → stale, drop
  cur._sessLoading = false; cur._sessions = (r&&r.ok&&Array.isArray(r.sessions)) ? r.sessions : []
  if (S.building) bRenderTeams()
}
// ---- custom personas (#42) ----

// by editPersona's parse-gate, 2xx-confirmed. The form stays OPEN on a real rejection (no optimistic
// close); it collapses only on success or the expected "new project not on disk yet" case.
function bRenderPersonas() {
  const el = $('#bPersonas'); if (!el) return
  const cps = S.builder.personas || {}; const keys = Object.keys(cps); const f = S.builder._pEdit
  const list = keys.length ? keys.map(k=>{ const p=cps[k]||{}; const used=membersUsingPersona(k)
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--line)"><code style="flex:0 0 auto">@${esc(k)}</code>
      <span class="muted" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.label||k)} · ${p.mount==='rw'?'rw':'ro'}${p.leadByDefault?' · lead':''}${used.length?' · '+used.length+' agent'+(used.length>1?'s':''):''}</span>
      <button class="btn tiny" style="flex:0 0 auto" data-k="${esc(k)}" onclick="bEditPersona(this.dataset.k)">edit</button>
      <button class="btn tiny" style="flex:0 0 auto" ${used.length?`title="in use by ${esc(used.join(', '))}"`:''} data-k="${esc(k)}" onclick="bRemovePersona(this.dataset.k)">✕</button></div>` }).join('')
    : `<div class="muted" style="font-size:12px">No custom roles yet — add one to define a project-specific expert (e.g. <code>@advertiser</code>).</div>`
  el.innerHTML = list + `<div style="margin-top:8px">${f ? personaForm(f) : `<button class="btn tiny" onclick="bNewPersona()">＋ custom role</button>`}</div><div id="bPMsg" class="muted" style="font-size:12px;margin-top:4px"></div>`

window.bNewPersona=()=>{ S.builder._pEdit={ key:'', label:'', mandate:'', backend:'claude', mount:'ro', leadByDefault:false, editing:false }; bRenderPersonas() }
window.bEditPersona=(k)=>{ const p=(S.builder.personas||{})[k]||{}; S.builder._pEdit={ key:k, label:p.label||'', mandate:p.mandate||'', backend:'claude', mount:p.mount==='rw'?'rw':'ro', leadByDefault:!!p.leadByDefault, editing:true }; bRenderPersonas() }

// which would steal focus mid-type. Key validity is enforced server-side on save (the parse-gate).
window.bPF=(k,v)=>{ const f=S.builder._pEdit; if(!f)return; f[k]=v; if(k==='mount'||k==='backend')bRenderPersonas() }
window.bSavePersona=async()=>{ const f=S.builder._pEdit; if(!f)return; const key=String(f.key||'').trim()
  const setMsg=(h)=>{ const m=$('#bPMsg'); if(m)m.innerHTML=h }
  if(!key){ setMsg('<span class="bad">key required</span>'); return }
  if(!String(f.mandate||'').trim()){ setMsg('<span class="bad">charter (mandate) required — it defines the role</span>'); return }
  const persona={ label:(f.label||'').trim()||key, mandate:f.mandate||'', mount:f.mount==='rw'?'rw':'ro', leadByDefault:!!f.leadByDefault }
  setMsg('<span class="muted">saving…</span>')
  const r=await api('/api/personas',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({org:S.builder.org,op:'save',key,persona})}).catch(()=>({ok:false,error:'network error'}))
  const localOnly = !r.ok && /unknown org/.test(r.error||'')   // new project not yet on disk — stage locally, team-save persists
  if(r.ok || localOnly){ S.builder.personas=S.builder.personas||{}; S.builder.personas[key]=persona; S.builder._pEdit=null
    bRenderPersonas(); bRenderTeams(); bPreview(); setMsg(r.ok?`<span class="good">✓ saved @${esc(key)} to project</span>`:`<span class="muted">added @${esc(key)} — 💾 Save team.json to persist</span>`) }
  else setMsg(`<span class="bad">✗ ${esc(r.error)}</span>`)   // parse/reference rejection → keep the form open to fix
}
window.bRemovePersona=async(k)=>{ const setMsg=(h)=>{ const m=$('#bPMsg'); if(m)m.innerHTML=h }
  const used=membersUsingPersona(k); if(used.length){ setMsg(`<span class="bad">@${esc(k)} is used by ${esc(used.join(', '))} — reassign first</span>`); return }
  // Removing deletes the role from the project's team.json (when on disk) — confirm, matching the other
  // disk-mutating actions (stopTeam/deleteProject). Recoverable by re-creating, so a plain confirm is enough.
  if(!confirm(`Remove custom role @${k}? It will be deleted from this project's team.json. You can re-create it later.`))return
  const r=await api('/api/personas',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({org:S.builder.org,op:'remove',key:k})}).catch(()=>({ok:false,error:'network error'}))
  const localOnly = !r.ok && /unknown org/.test(r.error||'')
  if(r.ok || localOnly){ delete S.builder.personas[k]; if(S.builder._pEdit&&S.builder._pEdit.key===k)S.builder._pEdit=null; bRenderPersonas(); bRenderTeams(); bPreview(); setMsg(`<span class="muted">removed @${esc(k)}</span>`) }

}

// Render the Settings modal — centered card + scrim over the whole app. EVENT-DRIVEN (openSettings /
// closeSettings / the tg handlers / enableNotifyPerm) — deliberately NOT called from paint()/tick(), so
// it never runs on the 1.5s poll. The `_modalShown` transition-guard makes repeated calls safe regardless:
// build the shell + focus the card ONLY on the open transition; clear + return focus to the gear ONLY on
// the close transition; an already-open call patches JUST the live Telegram bits (never rebuilds the inputs,
// never touches focus). (An earlier version was wired into paint() and stole focus every tick — fixed.)
let _modalShown = false, _modalSig = null
function renderModal() {
  const host = $('#modal'); if (!host) return
  const gear = $('#gearBtn')
  if (!S.settingsOpen) {
    if (_modalShown) {   // CLOSE transition only — never focus the gear on an unchanged-closed tick
      host.innerHTML=''; _modalShown=false; _modalSig=null
      if (gear) gear.setAttribute('aria-expanded','false')
      try { gear && gear.focus() } catch {}
    }
    return
  }
  if (!_modalShown) {   // OPEN transition — build the shell once, focus the CARD (not the ✕ → no hair-trigger Enter-close), trap Tab
    _modalShown=true; _modalSig=null
    if (gear) gear.setAttribute('aria-expanded','true')
    host.innerHTML = `<div class="scrim" onclick="if(event.target===this)closeSettings()">
      <div class="modalcard" role="dialog" aria-modal="true" aria-label="Settings" tabindex="-1">
        <div class="modalhead"><h2 style="margin:0;font-size:14px">⚙ Settings</h2><button class="btn tiny" aria-label="Close settings" onclick="closeSettings()">✕</button></div>
        <div class="modalbody" id="modalBody"></div>
      </div></div>`
    const card = host.querySelector('.modalcard')
    if (card) {
      try { card.focus() } catch {}
      card.addEventListener('keydown', (e)=>{
        if (e.key==='Escape') { e.preventDefault(); closeSettings(); return }
        if (e.key!=='Tab') return
        const f = [...card.querySelectorAll('button,a[href],input,select,textarea,[tabindex]:not([tabindex="-1"])')].filter(el=>!el.disabled && el.offsetParent!==null)
        if (!f.length) return
        const a=f[0], b=f[f.length-1]
        if (e.shiftKey && document.activeElement===a) { e.preventDefault(); b.focus() }
        else if (!e.shiftKey && document.activeElement===b) { e.preventDefault(); a.focus() }
      })
    }
  }
  // Body: the gear modal is GLOBAL-only now (#61) — turn-cap / notifications / port. No live Telegram
  // section here anymore (moved to the project home), so a full rebuild only on a SIGNATURE change
  // (open / loading→content / failed→ok) is enough; the inputs aren't clobbered on a poll because
  // renderModal is event-driven, not called from paint().
  const body = $('#modalBody'); if (!body) return
  const sig = S.settings ? (S.settings._failed?'failed':'ok') : 'loading'
  if (sig !== _modalSig) { body.innerHTML = settingsBody(); _modalSig = sig }
}

// #22: a push failure surfaces by KIND — re-link ONLY on an auth failure (the bot token / bot-blocked); a
// rate-limit or transient hiccup is retrying (no re-pair); anything else shows Telegram's accurate cause. The
// generic "re-link if stale" used to fire on every failure (a 429 or oversize) and mislead @user into re-pairing.
// Accepts the new classified object OR a legacy string. The `error` text is esc()'d (Telegram-supplied).
function tgPushErrHtml(e) {
  const o = (typeof e === 'string') ? { error: e, kind: 'other' } : (e || {})
  const msg = esc(String(o.error || 'error'))
  const amber = 'color:var(--warning);font-size:11px;margin-top:4px'
  if (o.kind === 'auth') return `<div class="bad" style="font-size:11px;margin-top:4px">⚠ Telegram delivery failed (bot auth): ${msg}. Re-link the bot below.</div>`
  if (o.kind === 'rate-limit') return `<div style="${amber}">⏳ Telegram rate-limited: ${msg}. Retrying automatically — no action needed.</div>`
  if (o.kind === 'transient') return `<div style="${amber}">⚠ Telegram delivery hiccup (transient): ${msg}. Retrying.</div>`
  return `<div class="bad" style="font-size:11px;margin-top:4px">⚠ Telegram delivery failed: ${msg}.</div>`   // accurate cause (e.g. "chat not found"), no misleading re-link
}
// Per-project Telegram pairing (#12), inside the modal. Trust-gate markup (Confirm/Reject a pending chat,
// the linked line + Unpair); every Telegram-supplied field is esc()'d (an unauthorized /start lands an
// attacker-controlled name here). Handlers (tgConfirm/Reject/Unpair) are CSRF-guarded via actJSON→/api/tg.
function tgSectionHtml() {
  const tg = (S.teams.telegram||{})[S.org]
  if (tg && tg.warning) return `<div class="bad" style="font-size:12px;margin-top:5px">⚠ ${esc(tg.warning)}</div>`
  if (!tg || !tg.configured) return `<div class="shelp">DM the project's bot <code>/start</code>, then Confirm here. Enable it by setting <code>MRC_TELEGRAM_BOT_TOKEN</code> in the repo's <code>.env</code>.</div>`
  const tgName = (x) => x.username ? `@${esc(x.username)}`
    : ([x.firstName, x.lastName].filter(Boolean).join(' ') ? esc([x.firstName, x.lastName].filter(Boolean).join(' '))
    : `chat ${esc(x.chatId || x.fromId)}`)
  if (tg.pending && tg.pending.length) {
    return `<div class="shelp" style="margin-top:5px">📱 Confirm to link a chat to <b>${esc(S.org)}</b> — confirm only YOUR account; an unexpected entry is someone else who messaged the bot — Reject it.</div>`
      + tg.pending.map(p=>{
          const realName = [p.firstName, p.lastName].filter(Boolean).join(' ')
          const detail = (p.username || realName) ? ` <span class="muted">(${[p.username && realName, `id ${esc(p.fromId)}`].filter(Boolean).join(', ')})</span>` : ''
          return `<div style="margin:6px 0"><div style="margin-bottom:5px"><b>${tgName(p)}</b>${detail} <span class="muted">→ link to</span> <b>${esc(S.org)}</b></div><div class="row" style="gap:6px"><button class="btn tiny primary" data-fid="${esc(p.fromId)}" onclick="tgConfirm(this.dataset.fid)">Confirm</button> <button class="btn tiny" data-fid="${esc(p.fromId)}" onclick="tgReject(this.dataset.fid)">Reject</button></div></div>`
        }).join('')
  }
  if (tg.pinned) {
    const p = tg.pinned
    const envChip = p.prePinned ? ` <span title="pinned via this repo's .env (MRC_TELEGRAM_CHAT_ID)" style="opacity:.7;font-size:10px;border:1px solid var(--line);border-radius:4px;padding:1px 4px">.env</span>` : ''
    return `<div style="display:flex;align-items:center;gap:6px;font-size:12px;margin-top:5px"><span aria-hidden="true">📱</span><span class="muted">linked to</span><b style="font-weight:600">${tgName(p)}</b>${envChip}<a href="#" style="margin-left:auto;color:var(--link)" onclick="tgUnpair();return false">unpair</a></div>`
      + (tg.lastPushError ? tgPushErrHtml(tg.lastPushError) : '')
  }
  return `<div class="shelp" style="margin-top:5px">📱 DM the bot <code>/start</code>, then Confirm here.</div>`
}

window.roomAct = async (a)=>{ if(a==='end'&&!confirm('Close this room?'))return; const r=await act(a,{roomId:S.selRoom}); if(!r.ok)return flashFail(r); S.flash=null; tick() }
window.doSteer = async ()=>{ const tx=$('#steerTx'); const t=$('#steerT'); if(!tx||!tx.value.trim())return; const r=await act('steer',{roomId:S.selRoom,target:t.value,text:tx.value.trim()}); if(!r.ok)return flashFail(r); tx.value=''; if(S.roomDrafts)delete S.roomDrafts[S.selRoom]   // #63-D: sent → clear the draft
  // #63-C: autoscroll the transcript to bottom to reveal the sent steer — only if already near bottom (no yank).
  const th=$('#thread'); if(th && th.scrollHeight-th.scrollTop-th.clientHeight<120) th.scrollTop=th.scrollHeight
  S.flash=null; tick() }
window.reviewCu = async (seq)=>{ const r=await act('review',{roomId:S.selRoom,seq}); if(!r.ok)return flashFail(r); S.flash=null; S.room=await api('/api/room?id='+encodeURIComponent(S.selRoom)); paintedKey=null; paint() }
// #20: confirm the reply landed (2xx) BEFORE closing the panel. A 403 (stale token) / network / 500 keeps
// the item open and surfaces the error — never optimistic-close (that was the silent-swallow @user hit).
window.answer = async (i)=>{ const tx=$('#ansTx'); if(!tx||!tx.value.trim())return; const r=await act('answer',{i,text:tx.value.trim()})
  // #24 stale-guard: it was resolved elsewhere (answered via Telegram / another window) between opening
  // the box and hitting Send. Do NOT swallow — tell the user their reply didn't go, and let the panel
  // re-render to the answered view (selInbox kept; detailKey now reflects the resolution).
  if(!r.ok){ if(/already (answered|dismissed)/i.test(r.error||'')){ S.flash={kind:'note',text:'Already resolved (answered via Telegram or another window) — your reply was not sent.'}; S.replyTo=null; renderFlash(); tick(); return } return flashFail(r) }
  S.flash=null; S.replyTo=null; tick() }   // #47: stay in the channel (don't close it); the item re-renders to its answered state inline
// #47: per-row reply composer — open/close which item's inline textarea is expanded (one at a time).
window.openReply = (id)=>{ S.replyTo=id; paint() }
window.cancelReply = ()=>{ S.replyTo=null; paint() }
// Dismiss without replying (#11). A QUESTION is a permanent-loss-on-misclick path → confirm first
// (the ✕ sits next to Send reply); a NOTIFICATION is fast FYI triage → instant, no confirm.
window.dismissInbox = async (id)=>{
  const it = (S.teams.userInbox||[]).find(x=>x.id===id)
  if (it && it.type==='question' && !confirm(`Dismiss without replying? ${it.fromName||('@'+it.from)} won't get an answer. (You can re-open it later from "show dismissed".)`)) return
  const r = await act('dismiss',{i:id}); if(!r.ok)return flashFail(r)   // keep it if the dismiss didn't land (#20)
  S.flash=null; if(S.replyTo===id)S.replyTo=null; tick()   // #47: stay in the channel; just close this item's composer
}
window.reopenInbox = async (i)=>{ const r=await act('reopen',{i}); if(!r.ok)return flashFail(r); S.flash=null; tick() }   // undo a dismiss → actionable again
// Telegram pairing (#12): Confirm is the trust gate (on the localhost dashboard); Reject/Unpair too.
// #46: these now live in the Settings modal, which is OFF the poll — so after the action, refresh the
// data (await tick → fresh S.teams.telegram) and explicitly re-render the modal's live Telegram bits.
// #61: Telegram now lives in the project HOME — a deliberate Confirm/Reject/unpair re-renders the home
// (a rebuild on a user action is fine; the #46 focus discipline is for the 1.5s POLL, handled in patchDetail).
const _tgAfter = ()=>{ S.flash=null; tick().then(()=>{ if(S.selHome) renderProjectHome($('#detail')) }) }
window.tgConfirm = async (fromId)=>{ const r=await actJSON('/api/tg',{action:'tgconfirm',org:S.org,fromId:Number(fromId)}); if(!r.ok)return flashFail(r); _tgAfter() }
window.tgReject = async (fromId)=>{ const r=await actJSON('/api/tg',{action:'tgreject',org:S.org,fromId:Number(fromId)}); if(!r.ok)return flashFail(r); _tgAfter() }
window.tgUnpair = async ()=>{ if(!confirm('Unpair Telegram? The linked chat stops receiving questions until you re-link.'))return; const r=await actJSON('/api/tg',{action:'tgunpair',org:S.org}); if(!r.ok)return flashFail(r); _tgAfter() }
// Delete project (#13): forget it from the daemon + stop sessions; nothing on disk is deleted.
window.deleteProject = async ()=>{ const org=S.org; if(!org||!confirm(`Delete "${org}" from Mister Claude? Its sessions stop and the tab is removed. Nothing on disk is deleted — your transcripts and team.json stay, so you can re-add it any time with \`mrc team up\`.`))return; const r=await actJSON('/api/team-delete',{org}); if(!r.ok)return flashFail(r); S.flash=null; S.org=null; S.selRoom=S.selInbox=S.selMember=null; S.selHome=false; if (S.building && S.builder?.org === org) S.building=false; tick() }   // #55-2: only drop the build if it's the org being deleted — deleting project X must not discard an unrelated in-progress build of Y (the builder pane runs off S.builder, independent of S.org)
window.toggleDismissed = ()=>{ S.showDismissed=!S.showDismissed; paint() }
window.toggleHandled = ()=>{ S.showHandled=!S.showHandled; paint() }   // (d) audit: expand "handled by leads — review"
